<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Learn DevOps in 90 days — the free incident-first path from developer to DevOps engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8fc97a"/><stop offset="1" stop-color="#33652c"/></linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 H0 V40" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/></pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="320" fill="url(#sheen)"/>
  <circle cx="980" cy="315" r="210" fill="#ffffff" fill-opacity="0.08"/>
  <text x="80" y="150" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="26" font-weight="700" letter-spacing="5" fill="#ffffff" fill-opacity="0.85">MISSION · 90 DAYS · DEVOPS</text>
  <text font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="68" font-weight="800" fill="#ffffff"><tspan x="80" y="300">Learn DevOps</tspan><tspan x="80" y="384">in 90 days</tspan></text>
  <text x="80" y="560" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" fill="#ffffff" fill-opacity="0.72">opscanopy.com/mission-90</text>
  <g transform="translate(980,315)" stroke="#ffffff" stroke-opacity="0.95" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Terminal window (left) -->
    <rect x="-150" y="-70" width="180" height="140" rx="14"/>
    <line x1="-150" y1="-38" x2="30" y2="-38"/>
    <polyline points="-122,-10 -94,16 -122,42"/>
    <line x1="-78" y1="42" x2="-30" y2="42"/>
    <!-- Flag on summit (right) — the 90-day finish -->
    <line x1="92" y1="-78" x2="92" y2="72"/>
    <path d="M92 -78 L170 -52 L92 -26 Z" fill="#ffffff" fill-opacity="0.9" stroke="none"/>
    <path d="M92 -78 L170 -52 L92 -26"/>
  </g>
</svg>
