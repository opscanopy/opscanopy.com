<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-label="A misrouted alert: on the left the alert hits the route tree and lands on the wrong receiver in red because continue is missing, on the right the corrected tree routes it to the right receiver in green">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#4a8c3f"/>
    </marker>
    <marker id="ahr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#c2321f"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="660" rx="20" fill="#ffffff" stroke="#e6e1d6" stroke-width="2"/>

  <!-- Title -->
  <text x="40" y="56" font-family="ui-sans-serif, system-ui" font-size="30" font-weight="700" fill="#141310">Why the alert went to the wrong receiver</text>

  <!-- Incoming alert (shared) -->
  <rect x="430" y="90" width="340" height="64" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="600" y="118" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="21" fill="#3a352c">Incoming alert</text>
  <text x="600" y="143" text-anchor="middle" font-family="ui-monospace, monospace" font-size="19" fill="#141310">{ severity=critical, team=db }</text>

  <!-- Split arrows down to each panel -->
  <path d="M520 154 L300 200" stroke="#c2321f" stroke-width="3" marker-end="url(#ahr)"/>
  <path d="M680 154 L900 200" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>

  <!-- ============ LEFT PANEL : BEFORE ============ -->
  <text x="120" y="220" font-family="ui-sans-serif, system-ui" font-size="23" font-weight="700" fill="#c2321f">before</text>

  <!-- root route -->
  <rect x="80" y="240" width="430" height="60" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="100" y="265" font-family="ui-sans-serif, system-ui" font-size="21" fill="#3a352c">route (root)</text>
  <text x="100" y="289" font-family="ui-monospace, monospace" font-size="19" fill="#141310">receiver: default</text>

  <!-- broad sibling matcher (matched first) -->
  <rect x="80" y="340" width="430" height="84" rx="12" fill="#f6ddd6" stroke="#c2321f" stroke-width="2"/>
  <text x="100" y="366" font-family="ui-sans-serif, system-ui" font-size="21" fill="#3a352c">broad sibling (matches first)</text>
  <text x="100" y="392" font-family="ui-monospace, monospace" font-size="19" fill="#141310">match: severity = critical</text>
  <text x="100" y="415" font-family="ui-monospace, monospace" font-size="19" fill="#c2321f">continue: missing</text>

  <!-- specific matcher never reached -->
  <rect x="80" y="444" width="430" height="84" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="100" y="470" font-family="ui-sans-serif, system-ui" font-size="21" fill="#9c968a">specific route (never reached)</text>
  <text x="100" y="496" font-family="ui-monospace, monospace" font-size="19" fill="#9c968a">match: team = db</text>
  <text x="100" y="519" font-family="ui-monospace, monospace" font-size="19" fill="#9c968a">receiver: db-oncall</text>

  <!-- wrong receiver -->
  <rect x="80" y="556" width="240" height="64" rx="12" fill="#f6ddd6" stroke="#c2321f" stroke-width="2"/>
  <text x="200" y="584" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="21" fill="#3a352c">receiver</text>
  <text x="200" y="609" text-anchor="middle" font-family="ui-monospace, monospace" font-size="19" fill="#c2321f">default (wrong)</text>

  <!-- left arrows -->
  <path d="M295 300 L295 340" stroke="#c2321f" stroke-width="3" marker-end="url(#ahr)"/>
  <path d="M200 424 L200 556" stroke="#c2321f" stroke-width="3" marker-end="url(#ahr)"/>

  <!-- divider -->
  <line x1="600" y1="200" x2="600" y2="630" stroke="#e6e1d6" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- ============ RIGHT PANEL : AFTER ============ -->
  <text x="690" y="220" font-family="ui-sans-serif, system-ui" font-size="23" font-weight="700" fill="#4a8c3f">after</text>

  <!-- root route -->
  <rect x="690" y="240" width="430" height="60" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="710" y="265" font-family="ui-sans-serif, system-ui" font-size="21" fill="#3a352c">route (root)</text>
  <text x="710" y="289" font-family="ui-monospace, monospace" font-size="19" fill="#141310">receiver: default</text>

  <!-- broad sibling with continue -->
  <rect x="690" y="340" width="430" height="84" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
  <text x="710" y="366" font-family="ui-sans-serif, system-ui" font-size="21" fill="#3a352c">broad sibling (continues)</text>
  <text x="710" y="392" font-family="ui-monospace, monospace" font-size="19" fill="#141310">match: severity = critical</text>
  <text x="710" y="415" font-family="ui-monospace, monospace" font-size="19" fill="#4a8c3f">continue: true</text>

  <!-- specific matcher reached -->
  <rect x="690" y="444" width="430" height="84" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
  <text x="710" y="470" font-family="ui-sans-serif, system-ui" font-size="21" fill="#3a352c">specific route (matches)</text>
  <text x="710" y="496" font-family="ui-monospace, monospace" font-size="19" fill="#141310">match: team = db</text>
  <text x="710" y="519" font-family="ui-monospace, monospace" font-size="19" fill="#141310">receiver: db-oncall</text>

  <!-- right receivers -->
  <rect x="690" y="556" width="205" height="64" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
  <text x="792" y="584" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="21" fill="#3a352c">receiver</text>
  <text x="792" y="609" text-anchor="middle" font-family="ui-monospace, monospace" font-size="19" fill="#141310">db-oncall</text>

  <rect x="915" y="556" width="205" height="64" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
  <text x="1017" y="584" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="21" fill="#3a352c">receiver</text>
  <text x="1017" y="609" text-anchor="middle" font-family="ui-monospace, monospace" font-size="19" fill="#141310">pager</text>

  <!-- right arrows -->
  <path d="M905 300 L905 340" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>
  <path d="M905 424 L905 444" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>
  <path d="M850 528 L800 556" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>
  <path d="M960 528 L1010 556" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>
</svg>
