<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-label="A PromQL query decomposed into metric name, label matcher, range selector, rate function and aggregation">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#4a8c3f"/>
    </marker>
    <marker id="ahr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#c2321f"/>
    </marker>
    <marker id="ahg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#9c968a"/>
    </marker>
  </defs>

  <rect width="1200" height="660" rx="20" fill="#ffffff" stroke="#e6e1d6" stroke-width="2"/>

  <!-- Title -->
  <text x="40" y="58" font-family="ui-sans-serif, system-ui" font-size="30" font-weight="700" fill="#141310">Anatomy of a PromQL query</text>

  <!-- ============ THE QUERY (monospace tokens, spaced for callouts) ============ -->
  <!-- sum by (job) ( rate ( http_requests_total { status=~"5.." } [5m] ) ) -->
  <text x="60" y="148" font-family="ui-monospace, monospace" font-size="26" fill="#141310">sum by (job)</text>
  <text x="232" y="148" font-family="ui-monospace, monospace" font-size="26" fill="#9c968a">(</text>
  <text x="260" y="148" font-family="ui-monospace, monospace" font-size="26" fill="#141310">rate</text>
  <text x="322" y="148" font-family="ui-monospace, monospace" font-size="26" fill="#9c968a">(</text>
  <text x="350" y="148" font-family="ui-monospace, monospace" font-size="26" fill="#141310">http_requests_total</text>
  <text x="654" y="148" font-family="ui-monospace, monospace" font-size="26" fill="#141310">{status=~"5.."}</text>
  <text x="876" y="148" font-family="ui-monospace, monospace" font-size="26" fill="#141310">[5m]</text>
  <text x="946" y="148" font-family="ui-monospace, monospace" font-size="26" fill="#9c968a">)</text>
  <text x="974" y="148" font-family="ui-monospace, monospace" font-size="26" fill="#9c968a">)</text>

  <!-- ============ UNDERLINE BRACKETS under each token group ============ -->
  <!-- metric name underline -->
  <path d="M350 162 L350 174 L626 174 L626 162" fill="none" stroke="#4a8c3f" stroke-width="2"/>
  <!-- label matcher underline -->
  <path d="M654 162 L654 174 L850 174 L850 162" fill="none" stroke="#4a8c3f" stroke-width="2"/>
  <!-- range selector underline -->
  <path d="M876 162 L876 174 L930 174 L930 162" fill="none" stroke="#4a8c3f" stroke-width="2"/>
  <!-- rate function brace -->
  <path d="M260 92 L260 80 L350 80 L350 92" fill="none" stroke="#4a8c3f" stroke-width="2"/>
  <!-- aggregation brace -->
  <path d="M60 92 L60 80 L232 80 L232 92" fill="none" stroke="#4a8c3f" stroke-width="2"/>

  <!-- ============ ROW 1: read inside-out — layers 1, 2, 3 ============ -->

  <!-- Layer 1: METRIC NAME -->
  <rect x="40" y="220" width="270" height="170" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="60" y="252" font-family="ui-sans-serif, system-ui" font-size="21" font-weight="700" fill="#3a352c">1. Metric name</text>
  <text x="60" y="290" font-family="ui-monospace, monospace" font-size="19" fill="#141310">http_requests_total</text>
  <text x="60" y="328" font-family="ui-sans-serif, system-ui" font-size="19" fill="#3a352c">The counter series you</text>
  <text x="60" y="352" font-family="ui-sans-serif, system-ui" font-size="19" fill="#3a352c">start from. On its own</text>
  <text x="60" y="376" font-family="ui-sans-serif, system-ui" font-size="19" fill="#3a352c">it is an instant vector.</text>

  <!-- Layer 2: LABEL MATCHER -->
  <rect x="340" y="220" width="270" height="170" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="360" y="252" font-family="ui-sans-serif, system-ui" font-size="21" font-weight="700" fill="#3a352c">2. Label matcher</text>
  <text x="360" y="290" font-family="ui-monospace, monospace" font-size="19" fill="#141310">{status=~"5.."}</text>
  <text x="360" y="328" font-family="ui-sans-serif, system-ui" font-size="19" fill="#3a352c">Regex match (=~) keeps</text>
  <text x="360" y="352" font-family="ui-sans-serif, system-ui" font-size="19" fill="#3a352c">only 5xx series. Also</text>
  <text x="360" y="376" font-family="ui-monospace, monospace" font-size="19" fill="#141310">= != =~ !~</text>

  <!-- Layer 3: RANGE SELECTOR -->
  <rect x="640" y="220" width="270" height="170" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="660" y="252" font-family="ui-sans-serif, system-ui" font-size="21" font-weight="700" fill="#3a352c">3. Range selector</text>
  <text x="660" y="290" font-family="ui-monospace, monospace" font-size="19" fill="#141310">[5m]</text>
  <text x="660" y="328" font-family="ui-sans-serif, system-ui" font-size="19" fill="#3a352c">Turns it into a range</text>
  <text x="660" y="352" font-family="ui-sans-serif, system-ui" font-size="19" fill="#3a352c">vector: every sample in</text>
  <text x="660" y="376" font-family="ui-sans-serif, system-ui" font-size="19" fill="#3a352c">the 5-minute window.</text>

  <!-- Arrows chaining layers 1 -> 2 -> 3 -->
  <line x1="314" y1="305" x2="336" y2="305" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>
  <line x1="614" y1="305" x2="636" y2="305" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>

  <!-- Arrow down from range selector into rate function -->
  <line x1="775" y1="394" x2="775" y2="436" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>

  <!-- ============ ROW 2: layer 4 (rate function) — emerald ============ -->
  <rect x="640" y="440" width="270" height="170" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
  <text x="660" y="472" font-family="ui-sans-serif, system-ui" font-size="21" font-weight="700" fill="#3a352c">4. rate() function</text>
  <text x="660" y="510" font-family="ui-monospace, monospace" font-size="19" fill="#141310">rate(...[5m])</text>
  <text x="660" y="548" font-family="ui-sans-serif, system-ui" font-size="19" fill="#3a352c">Per-second average rate</text>
  <text x="660" y="572" font-family="ui-sans-serif, system-ui" font-size="19" fill="#3a352c">of the counter; handles</text>
  <text x="660" y="596" font-family="ui-sans-serif, system-ui" font-size="19" fill="#3a352c">counter resets for you.</text>

  <!-- Arrow left from rate function into aggregation -->
  <line x1="636" y1="525" x2="614" y2="525" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>

  <!-- ============ ROW 2: layer 5 (aggregation) — emerald ============ -->
  <rect x="340" y="440" width="270" height="170" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
  <text x="360" y="472" font-family="ui-sans-serif, system-ui" font-size="21" font-weight="700" fill="#3a352c">5. Aggregation</text>
  <text x="360" y="510" font-family="ui-monospace, monospace" font-size="19" fill="#141310">sum by (job)</text>
  <text x="360" y="548" font-family="ui-sans-serif, system-ui" font-size="19" fill="#3a352c">Collapses many series</text>
  <text x="360" y="572" font-family="ui-sans-serif, system-ui" font-size="19" fill="#3a352c">into one rate per job;</text>
  <text x="360" y="596" font-family="ui-sans-serif, system-ui" font-size="19" fill="#3a352c">keeps only the job label.</text>

  <!-- Arrow left from aggregation into result -->
  <line x1="336" y1="525" x2="314" y2="525" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>

  <!-- ============ RESULT ============ -->
  <rect x="40" y="440" width="270" height="170" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="60" y="472" font-family="ui-sans-serif, system-ui" font-size="21" font-weight="700" fill="#3a352c">Result</text>
  <text x="60" y="512" font-family="ui-sans-serif, system-ui" font-size="19" fill="#3a352c">One 5xx error-rate</text>
  <text x="60" y="536" font-family="ui-sans-serif, system-ui" font-size="19" fill="#3a352c">line per job, per</text>
  <text x="60" y="560" font-family="ui-sans-serif, system-ui" font-size="19" fill="#3a352c">second, over the last</text>
  <text x="60" y="584" font-family="ui-sans-serif, system-ui" font-size="19" fill="#3a352c">5 minutes.</text>

  <!-- Trap callout (red): aggregate-before-rate -->
  <rect x="950" y="440" width="210" height="170" rx="12" fill="#f6ddd6" stroke="#c2321f" stroke-width="2"/>
  <text x="970" y="472" font-family="ui-sans-serif, system-ui" font-size="21" font-weight="700" fill="#3a352c">Trap</text>
  <text x="970" y="510" font-family="ui-monospace, monospace" font-size="18" fill="#141310">rate(sum(...))</text>
  <text x="970" y="540" font-family="ui-sans-serif, system-ui" font-size="18" fill="#3a352c">is a bug. Always</text>
  <text x="970" y="564" font-family="ui-sans-serif, system-ui" font-size="18" fill="#3a352c">rate first, then</text>
  <text x="970" y="588" font-family="ui-monospace, monospace" font-size="18" fill="#141310">sum(rate(...))</text>

  <!-- Read direction note -->
  <text x="950" y="252" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#3a352c">Read inside-out</text>
  <text x="950" y="284" font-family="ui-sans-serif, system-ui" font-size="18" fill="#3a352c">Evaluate the</text>
  <text x="950" y="308" font-family="ui-sans-serif, system-ui" font-size="18" fill="#3a352c">innermost</text>
  <text x="950" y="332" font-family="ui-sans-serif, system-ui" font-size="18" fill="#3a352c">expression first,</text>
  <text x="950" y="356" font-family="ui-sans-serif, system-ui" font-size="18" fill="#3a352c">then work</text>
  <text x="950" y="380" font-family="ui-sans-serif, system-ui" font-size="18" fill="#3a352c">outward.</text>
</svg>
