<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-label="An Alertmanager route tree with a root route branching into child routes labelled by matchers, leaves are receivers, and a sample alert flows down the matched path which is highlighted, with one branch marked continue true">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#4a8c3f"/>
    </marker>
    <marker id="ahg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#9c968a"/>
    </marker>
  </defs>

  <!-- Background panel -->
  <rect width="1200" height="680" rx="20" fill="#ffffff" stroke="#e6e1d6" stroke-width="2"/>

  <!-- Title -->
  <text x="40" y="56" font-family="ui-sans-serif, system-ui" font-size="30" font-weight="700" fill="#141310">An alert traversing the route tree</text>

  <!-- Alert chip (top-left) -->
  <rect x="40" y="86" width="372" height="58" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
  <text x="60" y="111" font-family="ui-sans-serif, system-ui" font-size="17" fill="#3a352c">incoming alert</text>
  <text x="60" y="134" font-family="ui-monospace, monospace" font-size="19" fill="#141310">{team=db, severity=critical}</text>

  <!-- Arrow from alert chip into root -->
  <path d="M226 144 L226 178 L490 178 L490 198" fill="none" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>

  <!-- ROOT route box -->
  <rect x="430" y="200" width="340" height="74" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="600" y="231" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="21" fill="#3a352c">root route</text>
  <text x="600" y="257" text-anchor="middle" font-family="ui-monospace, monospace" font-size="19" fill="#141310">receiver: default</text>

  <!-- Branch lines from root to children -->
  <!-- Root -> child A (db) : matched, emerald -->
  <path d="M600 274 L600 300 L240 300 L240 356" fill="none" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>
  <!-- Root -> child B (critical) : matched, emerald -->
  <path d="M600 274 L600 356" fill="none" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>
  <!-- Root -> fallthrough : gray -->
  <path d="M600 274 L600 300 L960 300 L960 356" fill="none" stroke="#9c968a" stroke-width="3" stroke-dasharray="6 5" marker-end="url(#ahg)"/>

  <!-- Matcher labels on branches -->
  <text x="240" y="333" text-anchor="middle" font-family="ui-monospace, monospace" font-size="19" fill="#141310">team = "db"</text>
  <text x="600" y="333" text-anchor="middle" font-family="ui-monospace, monospace" font-size="19" fill="#141310">severity = "critical"</text>
  <text x="960" y="333" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="19" fill="#6b675f">no match (fallthrough)</text>

  <!-- CHILD A : team=db (matched, emerald) -->
  <rect x="70" y="358" width="340" height="78" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
  <text x="240" y="389" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="21" fill="#3a352c">child route</text>
  <text x="240" y="416" text-anchor="middle" font-family="ui-monospace, monospace" font-size="19" fill="#141310">match: team="db"</text>

  <!-- CHILD B : severity=critical (matched, emerald) + continue:true -->
  <rect x="430" y="358" width="340" height="78" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
  <text x="600" y="389" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="21" fill="#3a352c">child route</text>
  <text x="600" y="416" text-anchor="middle" font-family="ui-monospace, monospace" font-size="19" fill="#141310">match: severity="critical"</text>

  <!-- continue:true badge -->
  <rect x="540" y="446" width="160" height="34" rx="9" fill="#ffffff" stroke="#4a8c3f" stroke-width="2"/>
  <text x="620" y="469" text-anchor="middle" font-family="ui-monospace, monospace" font-size="17" fill="#141310">continue: true</text>

  <!-- FALLTHROUGH child (gray, unmatched) -->
  <rect x="790" y="358" width="340" height="78" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="960" y="389" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="21" fill="#9c968a">other routes</text>
  <text x="960" y="416" text-anchor="middle" font-family="ui-monospace, monospace" font-size="19" fill="#9c968a">match: team="web"</text>

  <!-- Child A -> receiver db-oncall (matched, emerald) -->
  <path d="M240 436 L240 524" fill="none" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>
  <!-- Child B -> receiver pager (matched, emerald). Continue:true means it also keeps going, so this leaf is reached -->
  <path d="M600 480 L600 524" fill="none" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>
  <!-- Fallthrough child -> receiver (gray) -->
  <path d="M960 436 L960 524" fill="none" stroke="#9c968a" stroke-width="3" stroke-dasharray="6 5" marker-end="url(#ahg)"/>

  <!-- RECEIVER LEAVES -->
  <!-- db-oncall (matched) -->
  <rect x="70" y="526" width="340" height="72" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
  <text x="240" y="556" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="19" fill="#3a352c">receiver (leaf)</text>
  <text x="240" y="582" text-anchor="middle" font-family="ui-monospace, monospace" font-size="19" fill="#141310">db-oncall</text>

  <!-- pager (matched) -->
  <rect x="430" y="526" width="340" height="72" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
  <text x="600" y="556" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="19" fill="#3a352c">receiver (leaf)</text>
  <text x="600" y="582" text-anchor="middle" font-family="ui-monospace, monospace" font-size="19" fill="#141310">pager</text>

  <!-- unmatched receiver (gray) -->
  <rect x="790" y="526" width="340" height="72" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="960" y="556" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="19" fill="#9c968a">receiver (leaf)</text>
  <text x="960" y="582" text-anchor="middle" font-family="ui-monospace, monospace" font-size="19" fill="#9c968a">web-oncall</text>

  <!-- Legend -->
  <line x1="40" y1="636" x2="80" y2="636" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>
  <text x="90" y="642" font-family="ui-sans-serif, system-ui" font-size="17" fill="#3a352c">matched path (alert delivered here)</text>
  <line x1="520" y1="636" x2="560" y2="636" stroke="#9c968a" stroke-width="3" stroke-dasharray="6 5" marker-end="url(#ahg)"/>
  <text x="570" y="642" font-family="ui-sans-serif, system-ui" font-size="17" fill="#6b675f">unmatched path (skipped)</text>
  <rect x="900" y="624" width="22" height="22" rx="6" fill="#ffffff" stroke="#4a8c3f" stroke-width="2"/>
  <text x="930" y="642" font-family="ui-sans-serif, system-ui" font-size="17" fill="#3a352c">continue: true keeps matching siblings</text>
</svg>
