<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="A crontab line mapped to a systemd .timer unit with OnCalendar and a .service unit with ExecStart">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end"><path d="M0 0 L10 5 L0 10 z" fill="#4a8c3f"/></marker>
    <marker id="ahr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end"><path d="M0 0 L10 5 L0 10 z" fill="#c2321f"/></marker>
    <marker id="ahg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end"><path d="M0 0 L10 5 L0 10 z" fill="#9c968a"/></marker>
  </defs>
  <rect width="1200" height="620" rx="20" fill="#ffffff" stroke="#e6e1d6" stroke-width="2"/>
  <text x="48" y="62" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="30" font-weight="700" fill="#141310">One crontab line becomes a .timer and a .service</text>

  <!-- LEFT: crontab box -->
  <text x="48" y="146" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#3a352c">crontab entry</text>
  <rect x="48" y="166" width="430" height="170" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="72" y="232" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#141310">*/10 * * * *</text>
  <text x="72" y="270" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#141310">/usr/local/bin/backup.sh</text>
  <text x="72" y="312" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="17" fill="#6b675f">schedule + command, one line</text>

  <!-- Arrow to the right -->
  <line x1="490" y1="251" x2="640" y2="251" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>
  <text x="500" y="238" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="17" fill="#33652c">splits into</text>

  <!-- RIGHT: two stacked unit boxes -->
  <!-- .timer unit -->
  <text x="660" y="146" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#3a352c">backup.timer  (when to run)</text>
  <rect x="660" y="166" width="492" height="160" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
  <text x="684" y="206" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#141310">[Timer]</text>
  <text x="684" y="240" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#141310">OnCalendar=*-*-* *:0/10:00</text>
  <text x="684" y="274" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#141310">Persistent=true</text>
  <text x="684" y="308" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#141310">[Install] WantedBy=timers.target</text>

  <!-- timer pulls in service arrow -->
  <line x1="906" y1="326" x2="906" y2="392" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>
  <text x="922" y="366" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="17" fill="#33652c">fires → pulls in</text>

  <!-- .service unit -->
  <text x="660" y="430" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#3a352c">backup.service  (what to run)</text>
  <rect x="660" y="450" width="492" height="140" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="684" y="490" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#141310">[Service]</text>
  <text x="684" y="524" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#141310">Type=oneshot</text>
  <text x="684" y="558" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#141310">ExecStart=/usr/local/bin/backup.sh</text>

  <!-- enable note -->
  <text x="48" y="470" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#3a352c">enable the timer, not the service:</text>
  <rect x="48" y="492" width="500" height="64" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="72" y="532" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#141310">systemctl enable --now backup.timer</text>
</svg>
