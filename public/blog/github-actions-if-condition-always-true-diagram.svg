<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="A GitHub Actions if condition that is always true because it returns a truthy string, next to the corrected boolean expression">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end"><path d="M0 0 L10 5 L0 10 z" fill="#10b981"/></marker>
    <marker id="ahr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end"><path d="M0 0 L10 5 L0 10 z" fill="#ef4444"/></marker>
    <marker id="ahg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end"><path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="1200" height="640" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <text x="48" y="62" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="30" font-weight="700" fill="#0f172a">An <tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">if:</tspan> that is always true vs. the boolean fix</text>

  <!-- WRONG ROW -->
  <g>
    <rect x="48" y="100" width="220" height="40" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="158" y="126" text-anchor="middle" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" font-weight="700" fill="#ef4444">WRONG · always true</text>

    <!-- expression box -->
    <rect x="48" y="156" width="640" height="92" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="72" y="190" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#334155">Step condition with literal text outside the braces</text>
    <text x="72" y="226" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#0f172a">if: ${{ github.ref == 'refs/heads/main' }} &amp;&amp; success()</text>

    <!-- arrow to evaluation -->
    <line x1="690" y1="202" x2="772" y2="202" stroke="#ef4444" stroke-width="3" marker-end="url(#ahr)"/>

    <!-- evaluated value box -->
    <rect x="780" y="156" width="372" height="92" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="804" y="190" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#334155">Coerced to a non-empty string</text>
    <text x="804" y="226" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#0f172a">"true &amp;&amp; success()"  → truthy</text>

    <!-- result note -->
    <text x="48" y="288" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#ef4444">A non-empty string is truthy, so the step runs on every branch — the condition is just decoration.</text>
  </g>

  <!-- divider -->
  <line x1="48" y1="328" x2="1152" y2="328" stroke="#e2e8f0" stroke-width="2"/>

  <!-- RIGHT ROW -->
  <g>
    <rect x="48" y="360" width="200" height="40" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text x="148" y="386" text-anchor="middle" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" font-weight="700" fill="#047857">RIGHT · boolean</text>

    <!-- expression box -->
    <rect x="48" y="416" width="640" height="92" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text x="72" y="450" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#334155">One bare expression — no ${{ }}, no quotes</text>
    <text x="72" y="486" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#0f172a">if: github.ref == 'refs/heads/main' &amp;&amp; success()</text>

    <!-- arrow to evaluation -->
    <line x1="690" y1="462" x2="772" y2="462" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>

    <!-- evaluated value box -->
    <rect x="780" y="416" width="372" height="92" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
    <text x="804" y="450" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#334155">Evaluated as a real boolean</text>
    <text x="804" y="486" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#0f172a">true on main, false elsewhere</text>

    <!-- result note -->
    <text x="48" y="548" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#047857">The step runs only on main and only when prior steps succeeded — the condition actually gates.</text>
  </g>

  <!-- rule of thumb footer -->
  <rect x="48" y="576" width="1104" height="44" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="72" y="604" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#334155">Rule of thumb: in an <tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#0f172a">if:</tspan> there are no <tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#0f172a">${{ }}</tspan> and no surrounding quotes — just the expression.</text>
</svg>
