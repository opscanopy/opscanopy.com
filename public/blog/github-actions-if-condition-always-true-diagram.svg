<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="A GitHub Actions if condition that is always true because it returns a truthy string, next to the corrected boolean expression">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end"><path d="M0 0 L10 5 L0 10 z" fill="#4a8c3f"/></marker>
    <marker id="ahr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end"><path d="M0 0 L10 5 L0 10 z" fill="#c2321f"/></marker>
    <marker id="ahg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end"><path d="M0 0 L10 5 L0 10 z" fill="#9c968a"/></marker>
  </defs>
  <rect width="1200" height="640" rx="20" fill="#ffffff" stroke="#e6e1d6" stroke-width="2"/>

  <text x="48" y="62" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="30" font-weight="700" fill="#141310">An <tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">if:</tspan> that is always true vs. the boolean fix</text>

  <!-- WRONG ROW -->
  <g>
    <rect x="48" y="100" width="220" height="40" rx="12" fill="#f6ddd6" stroke="#c2321f" stroke-width="2"/>
    <text x="158" y="126" text-anchor="middle" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" font-weight="700" fill="#c2321f">WRONG · always true</text>

    <!-- expression box -->
    <rect x="48" y="156" width="640" height="92" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
    <text x="72" y="190" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#3a352c">Step condition with literal text outside the braces</text>
    <text x="72" y="226" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#141310">if: ${{ github.ref == 'refs/heads/main' }} &amp;&amp; success()</text>

    <!-- arrow to evaluation -->
    <line x1="690" y1="202" x2="772" y2="202" stroke="#c2321f" stroke-width="3" marker-end="url(#ahr)"/>

    <!-- evaluated value box -->
    <rect x="780" y="156" width="372" height="92" rx="12" fill="#f6ddd6" stroke="#c2321f" stroke-width="2"/>
    <text x="804" y="190" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#3a352c">Coerced to a non-empty string</text>
    <text x="804" y="226" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#141310">"true &amp;&amp; success()"  → truthy</text>

    <!-- result note -->
    <text x="48" y="288" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#c2321f">A non-empty string is truthy, so the step runs on every branch — the condition is just decoration.</text>
  </g>

  <!-- divider -->
  <line x1="48" y1="328" x2="1152" y2="328" stroke="#e6e1d6" stroke-width="2"/>

  <!-- RIGHT ROW -->
  <g>
    <rect x="48" y="360" width="200" height="40" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
    <text x="148" y="386" text-anchor="middle" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" font-weight="700" fill="#33652c">RIGHT · boolean</text>

    <!-- expression box -->
    <rect x="48" y="416" width="640" height="92" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
    <text x="72" y="450" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#3a352c">One bare expression — no ${{ }}, no quotes</text>
    <text x="72" y="486" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#141310">if: github.ref == 'refs/heads/main' &amp;&amp; success()</text>

    <!-- arrow to evaluation -->
    <line x1="690" y1="462" x2="772" y2="462" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>

    <!-- evaluated value box -->
    <rect x="780" y="416" width="372" height="92" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
    <text x="804" y="450" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#3a352c">Evaluated as a real boolean</text>
    <text x="804" y="486" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#141310">true on main, false elsewhere</text>

    <!-- result note -->
    <text x="48" y="548" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#33652c">The step runs only on main and only when prior steps succeeded — the condition actually gates.</text>
  </g>

  <!-- rule of thumb footer -->
  <rect x="48" y="576" width="1104" height="44" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="72" y="604" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#3a352c">Rule of thumb: in an <tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#141310">if:</tspan> there are no <tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#141310">${{ }}</tspan> and no surrounding quotes — just the expression.</text>
</svg>
