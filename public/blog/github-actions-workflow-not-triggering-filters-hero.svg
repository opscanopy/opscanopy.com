<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Why a GitHub Actions workflow did not trigger — OpsCanopy CI/CD guide">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6f78c0"/><stop offset="1" stop-color="#5560a8"/></linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 H0 V40" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/></pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="320" fill="url(#sheen)"/>
  <circle cx="980" cy="315" r="210" fill="#ffffff" fill-opacity="0.08"/>
  <text x="80" y="150" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="26" font-weight="700" letter-spacing="5" fill="#ffffff" fill-opacity="0.85">GITHUB ACTIONS</text>
  <text font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="68" font-weight="800" fill="#ffffff"><tspan x="80" y="300">Workflow didn't</tspan><tspan x="80" y="384">trigger</tspan></text>
  <text x="80" y="560" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" fill="#ffffff" fill-opacity="0.72">opscanopy.com</text>
  <g transform="translate(980,315)" stroke="#ffffff" stroke-opacity="0.95" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- funnel / filter body -->
    <polygon points="-115,-108 115,-108 22,-2 22,86 -22,114 -22,-2" fill="#ffffff" fill-opacity="0.12"/>
    <polyline points="-115,-108 115,-108 22,-2 22,86 -22,114 -22,-2 -115,-108"/>
    <!-- no-entry symbol at narrow bottom -->
    <circle cx="0" cy="98" r="40" fill="#5560a8" fill-opacity="0.9"/>
    <circle cx="0" cy="98" r="40"/>
    <line x1="-25" y1="98" x2="25" y2="98"/>
  </g>
</svg>
