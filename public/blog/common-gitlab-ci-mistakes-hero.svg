<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Common .gitlab-ci.yml mistakes — OpsCanopy CI/CD guide">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6f78c0"/><stop offset="1" stop-color="#5560a8"/></linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 H0 V40" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/></pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="320" fill="url(#sheen)"/>
  <circle cx="980" cy="315" r="210" fill="#ffffff" fill-opacity="0.08"/>
  <text x="80" y="150" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="26" font-weight="700" letter-spacing="5" fill="#ffffff" fill-opacity="0.85">CI / CD</text>
  <text font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="68" font-weight="800" fill="#ffffff"><tspan x="80" y="300">7 .gitlab-ci.yml</tspan><tspan x="80" y="384">Mistakes</tspan></text>
  <text x="80" y="560" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" fill="#ffffff" fill-opacity="0.72">opscanopy.com</text>
  <g transform="translate(980,315)" stroke="#ffffff" stroke-opacity="0.95" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- pipeline: three connected nodes on a horizontal track -->
    <line x1="-112" y1="48" x2="112" y2="48"/>
    <circle cx="-112" cy="48" r="28"/>
    <circle cx="0" cy="48" r="28"/>
    <circle cx="112" cy="48" r="28"/>
    <!-- warning triangle overlapping the pipeline -->
    <polygon points="0,-120 100,52 -100,52" fill="#5560a8" stroke="#ffffff" stroke-width="7"/>
    <!-- exclamation mark inside the triangle -->
    <line x1="0" y1="-60" x2="0" y2="6"/>
    <circle cx="0" cy="36" r="7" fill="#ffffff" fill-opacity="0.9" stroke="none"/>
  </g>
</svg>
