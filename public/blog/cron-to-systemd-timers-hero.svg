<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="cron to systemd timers — OpsCanopy scheduling guide">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fb7185"/><stop offset="1" stop-color="#be123c"/></linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 H0 V40" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/></pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="320" fill="url(#sheen)"/>
  <circle cx="980" cy="315" r="210" fill="#ffffff" fill-opacity="0.08"/>
  <text x="80" y="150" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="26" font-weight="700" letter-spacing="5" fill="#ffffff" fill-opacity="0.85">SCHEDULING</text>
  <text font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="68" font-weight="800" fill="#ffffff"><tspan x="80" y="300">cron →</tspan><tspan x="80" y="384">systemd timers</tspan></text>
  <text x="80" y="560" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" fill="#ffffff" fill-opacity="0.72">opscanopy.com</text>
  <g transform="translate(980,315)" stroke="#ffffff" stroke-opacity="0.95" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Clock on the left -->
    <circle cx="-95" cy="0" r="72"/>
    <polyline points="-95,0 -95,-42"/>
    <polyline points="-95,0 -60,12"/>
    <line x1="-95" y1="-72" x2="-95" y2="-62"/>
    <line x1="-95" y1="72" x2="-95" y2="62"/>
    <line x1="-167" y1="0" x2="-157" y2="0"/>
    <line x1="-23" y1="0" x2="-33" y2="0"/>
    <!-- Short arrow to the gear -->
    <line x1="-6" y1="0" x2="40" y2="0"/>
    <polyline points="26,-14 42,0 26,14"/>
    <!-- Gear/cog on the right -->
    <circle cx="108" cy="0" r="40"/>
    <circle cx="108" cy="0" r="16" fill="#ffffff" fill-opacity="0.9" stroke="none"/>
    <g stroke-width="6">
      <line x1="108" y1="-40" x2="108" y2="-64"/>
      <line x1="108" y1="40" x2="108" y2="64"/>
      <line x1="68" y1="0" x2="44" y2="0"/>
      <line x1="148" y1="0" x2="172" y2="0"/>
      <line x1="80" y1="-28" x2="63" y2="-45"/>
      <line x1="136" y1="28" x2="153" y2="45"/>
      <line x1="80" y1="28" x2="63" y2="45"/>
      <line x1="136" y1="-28" x2="153" y2="-45"/>
    </g>
  </g>
</svg>
