<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="The Prometheus scrape lifecycle showing service discovery and __meta_ labels, then relabel_configs which can drop a whole target, then the scrape, then metric_relabel_configs which can drop individual samples, then the TSDB">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#10b981"/>
    </marker>
    <marker id="ahr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background panel -->
  <rect width="1200" height="620" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Title -->
  <text x="40" y="58" font-family="ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="700" fill="#0f172a">relabel_configs vs metric_relabel_configs</text>

  <!-- ROW 1: boxes 1-3 -->
  <!-- Box 1: Service Discovery -->
  <rect x="40" y="130" width="280" height="120" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="180" y="178" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" fill="#334155">Service Discovery</text>
  <text x="180" y="212" text-anchor="middle" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">__meta_ labels</text>

  <!-- Arrow 1 -> 2 -->
  <line x1="324" y1="190" x2="438" y2="190" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>

  <!-- Box 2: relabel_configs (emerald) -->
  <rect x="442" y="130" width="280" height="120" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="582" y="178" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" fill="#334155">applies</text>
  <text x="582" y="212" text-anchor="middle" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">relabel_configs</text>

  <!-- Arrow 2 -> 3 -->
  <line x1="726" y1="190" x2="840" y2="190" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>

  <!-- Box 3: Scrape target -->
  <rect x="844" y="130" width="280" height="120" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="984" y="178" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" fill="#334155">Scrape target</text>
  <text x="984" y="212" text-anchor="middle" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">/metrics</text>

  <!-- Red callout under relabel_configs -->
  <rect x="442" y="270" width="280" height="58" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="582" y="305" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" fill="#ef4444">can DROP a whole target here</text>
  <!-- connector from box 2 down to callout -->
  <line x1="582" y1="252" x2="582" y2="268" stroke="#ef4444" stroke-width="3" marker-end="url(#ahr)"/>

  <!-- Vertical connector from Box 3 down to Box 4 (wraps to row 2) -->
  <path d="M984 250 L984 370 L582 370 L582 408" fill="none" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>

  <!-- ROW 2: boxes 4-5 -->
  <!-- Box 4: metric_relabel_configs (emerald) -->
  <rect x="442" y="412" width="280" height="120" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="582" y="460" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" fill="#334155">applies</text>
  <text x="582" y="494" text-anchor="middle" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">metric_relabel_configs</text>

  <!-- Arrow 4 -> 5 -->
  <line x1="726" y1="472" x2="840" y2="472" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>

  <!-- Box 5: TSDB -->
  <rect x="844" y="412" width="280" height="120" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="984" y="460" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" fill="#334155">stored in</text>
  <text x="984" y="494" text-anchor="middle" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">TSDB</text>

  <!-- Red callout under metric_relabel_configs -->
  <rect x="442" y="552" width="280" height="48" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="582" y="582" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" fill="#ef4444">can DROP individual samples here</text>
  <!-- connector from box 4 down to callout -->
  <line x1="582" y1="534" x2="582" y2="550" stroke="#ef4444" stroke-width="3" marker-end="url(#ahr)"/>
</svg>
