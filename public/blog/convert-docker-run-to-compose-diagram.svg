<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-label="A mapping showing docker run flags on the left connected by arrows to their docker-compose.yml keys on the right">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#10b981"/>
    </marker>
  </defs>

  <rect width="1200" height="660" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <text x="40" y="56" font-family="ui-sans-serif, system-ui" font-size="30" font-weight="700" fill="#0f172a">docker run flag &#8594; docker-compose.yml key</text>

  <!-- Column headers -->
  <text x="60" y="118" font-family="ui-sans-serif, system-ui" font-size="21" font-weight="600" fill="#334155">docker run flag</text>
  <text x="760" y="118" font-family="ui-sans-serif, system-ui" font-size="21" font-weight="600" fill="#334155">docker-compose.yml key</text>

  <!-- Arrows (drawn first so boxes sit on top edges cleanly) -->
  <line x1="560" y1="172" x2="755" y2="172" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>
  <line x1="560" y1="252" x2="755" y2="252" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>
  <line x1="560" y1="332" x2="755" y2="332" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>
  <line x1="560" y1="412" x2="755" y2="412" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>
  <line x1="560" y1="492" x2="755" y2="492" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>
  <line x1="560" y1="572" x2="755" y2="572" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>

  <!-- LEFT neutral monospace chips -->
  <rect x="60" y="146" width="500" height="52" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="84" y="179" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">-p 8080:80</text>

  <rect x="60" y="226" width="500" height="52" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="84" y="259" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">-v appdata:/var/lib/app</text>

  <rect x="60" y="306" width="500" height="52" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="84" y="339" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">-e LOG_LEVEL=info</text>

  <rect x="60" y="386" width="500" height="52" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="84" y="419" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">--restart unless-stopped</text>

  <rect x="60" y="466" width="500" height="52" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="84" y="499" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">--name web</text>

  <rect x="60" y="546" width="500" height="52" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="84" y="579" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">--network app-net</text>

  <!-- RIGHT emerald-accented boxes -->
  <rect x="760" y="146" width="380" height="52" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="784" y="179" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">ports:</text>

  <rect x="760" y="226" width="380" height="52" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="784" y="259" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">volumes:</text>

  <rect x="760" y="306" width="380" height="52" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="784" y="339" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">environment:</text>

  <rect x="760" y="386" width="380" height="52" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="784" y="419" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">restart:</text>

  <rect x="760" y="466" width="380" height="52" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="784" y="499" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">container_name:</text>

  <rect x="760" y="546" width="380" height="52" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="784" y="579" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">networks:</text>
</svg>
