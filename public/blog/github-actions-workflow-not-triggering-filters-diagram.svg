<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="A decision flow showing how branches, tags and paths filters decide whether a GitHub Actions workflow triggers on a push">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end"><path d="M0 0 L10 5 L0 10 z" fill="#10b981"/></marker>
    <marker id="ahr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end"><path d="M0 0 L10 5 L0 10 z" fill="#ef4444"/></marker>
    <marker id="ahg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end"><path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="1200" height="720" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <text x="48" y="62" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="30" font-weight="700" fill="#0f172a">How branches, tags &amp; paths decide if a push triggers a workflow</text>

  <!-- Event node -->
  <rect x="48" y="100" width="280" height="92" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="68" y="134" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#334155">push event arrives</text>
  <text x="68" y="166" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#0f172a">on.push filters</text>

  <!-- DIAMOND 1: branches / tags ref match -->
  <path d="M188 232 L378 320 L188 408 L-2 320 Z" transform="translate(132,0)" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="320" y="305" text-anchor="middle" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#334155">Ref matches</text>
  <text x="320" y="335" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#0f172a">branches</text>
  <text x="320" y="362" text-anchor="middle" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="17" fill="#64748b">or tags glob?</text>

  <!-- arrow event -> diamond1 -->
  <line x1="188" y1="192" x2="265" y2="248" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>

  <!-- DIAMOND 2: paths match -->
  <path d="M188 232 L378 320 L188 408 L-2 320 Z" transform="translate(412,0)" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="600" y="298" text-anchor="middle" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#334155">A changed file</text>
  <text x="600" y="326" text-anchor="middle" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="17" fill="#64748b">matches</text>
  <text x="600" y="352" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#0f172a">paths</text>

  <!-- arrow diamond1 -> diamond2 (YES, ANDed) -->
  <line x1="510" y1="320" x2="592" y2="320" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>
  <text x="551" y="308" text-anchor="middle" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="16" font-weight="700" fill="#047857">yes</text>
  <text x="551" y="345" text-anchor="middle" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="14" fill="#64748b">AND</text>

  <!-- DIAMOND 3: paths-ignore -->
  <path d="M188 232 L378 320 L188 408 L-2 320 Z" transform="translate(692,0)" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="880" y="298" text-anchor="middle" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#334155">Some file is</text>
  <text x="880" y="326" text-anchor="middle" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="17" fill="#64748b">outside</text>
  <text x="880" y="352" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#0f172a">paths-ignore</text>

  <!-- arrow diamond2 -> diamond3 (YES) -->
  <line x1="790" y1="320" x2="872" y2="320" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>
  <text x="831" y="308" text-anchor="middle" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="16" font-weight="700" fill="#047857">yes</text>

  <!-- WORKFLOW RUNS node -->
  <rect x="1000" y="276" width="150" height="88" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="1075" y="312" text-anchor="middle" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" font-weight="700" fill="#047857">workflow</text>
  <text x="1075" y="340" text-anchor="middle" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" font-weight="700" fill="#047857">runs</text>

  <!-- arrow diamond3 -> runs (YES) -->
  <line x1="1070" y1="320" x2="996" y2="320" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>
  <text x="1033" y="308" text-anchor="middle" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="16" font-weight="700" fill="#047857">yes</text>

  <!-- SKIPPED node (shared, bottom) -->
  <rect x="500" y="560" width="200" height="84" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="600" y="595" text-anchor="middle" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="22" font-weight="700" fill="#475569">skipped</text>
  <text x="600" y="623" text-anchor="middle" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="16" fill="#64748b">no run, no error</text>

  <!-- NO arrows down to skipped -->
  <!-- diamond1 NO -->
  <path d="M320 408 L320 488 L560 488 L560 558" fill="none" stroke="#94a3b8" stroke-width="3" marker-end="url(#ahg)"/>
  <text x="334" y="438" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="16" font-weight="700" fill="#64748b">no</text>
  <text x="334" y="461" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#64748b">feature* misses feature/login</text>

  <!-- diamond2 NO -->
  <path d="M600 408 L600 558" fill="none" stroke="#94a3b8" stroke-width="3" marker-end="url(#ahg)"/>
  <text x="614" y="448" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="16" font-weight="700" fill="#64748b">no</text>
  <text x="614" y="471" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#64748b">only README.md changed</text>

  <!-- diamond3 NO (every file ignored) -->
  <path d="M880 408 L880 488 L640 488 L640 558" fill="none" stroke="#94a3b8" stroke-width="3" marker-end="url(#ahg)"/>
  <text x="700" y="438" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="16" font-weight="700" fill="#64748b">no</text>
  <text x="700" y="461" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#64748b">every file matches docs/** , **.md</text>

  <!-- footnote -->
  <text x="48" y="690" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="16" fill="#64748b">A missing filter means "match everything." When present, branches/tags and paths are ANDed — both must pass. Over 300 changed files: filtering gives up and the run proceeds.</text>
</svg>
