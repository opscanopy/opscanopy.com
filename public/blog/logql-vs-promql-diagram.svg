<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 730" role="img" aria-label="The same query written in PromQL and LogQL side by side, with equivalent parts connected by arrows">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#4a8c3f"/>
    </marker>
    <marker id="ahr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#c2321f"/>
    </marker>
    <marker id="ahg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#9c968a"/>
    </marker>
  </defs>

  <!-- Background panel -->
  <rect width="1200" height="730" rx="20" fill="#ffffff" stroke="#e6e1d6" stroke-width="2"/>

  <!-- Title -->
  <text x="40" y="58" font-family="ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="700" fill="#141310">The same query in PromQL and LogQL</text>

  <!-- Column headers -->
  <text x="290" y="118" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="700" fill="#141310">PromQL</text>
  <text x="910" y="118" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="24" font-weight="700" fill="#141310">LogQL</text>

  <!-- ============ ROW 1: sum by aggregation ============ -->
  <!-- PromQL sum by -->
  <rect x="40" y="150" width="500" height="86" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
  <text x="64" y="184" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" fill="#3a352c">aggregation</text>
  <text x="64" y="218" font-family="ui-monospace, monospace" font-size="19" fill="#141310">sum by (status) (...)</text>

  <!-- LogQL sum by -->
  <rect x="660" y="150" width="500" height="86" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
  <text x="684" y="184" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" fill="#3a352c">aggregation</text>
  <text x="684" y="218" font-family="ui-monospace, monospace" font-size="19" fill="#141310">sum by (status) (...)</text>

  <!-- Arrow: sum by <-> sum by (identical) -->
  <line x1="544" y1="193" x2="656" y2="193" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)" marker-start="url(#ah)"/>
  <text x="600" y="184" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#4a8c3f">identical</text>

  <!-- ============ ROW 2: rate() ============ -->
  <!-- PromQL rate -->
  <rect x="40" y="290" width="500" height="86" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="64" y="324" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" fill="#3a352c">range function</text>
  <text x="64" y="358" font-family="ui-monospace, monospace" font-size="19" fill="#141310">rate( ... [5m])</text>

  <!-- LogQL rate -->
  <rect x="660" y="290" width="500" height="86" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="684" y="324" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" fill="#3a352c">range function</text>
  <text x="684" y="358" font-family="ui-monospace, monospace" font-size="19" fill="#141310">rate( ... [5m])</text>

  <!-- Arrow: rate <-> rate (different meaning) -->
  <line x1="544" y1="333" x2="656" y2="333" stroke="#c2321f" stroke-width="3" marker-end="url(#ahr)" marker-start="url(#ahr)"/>

  <!-- Red callout: rate means two different things -->
  <rect x="320" y="402" width="560" height="56" rx="12" fill="#f6ddd6" stroke="#c2321f" stroke-width="2"/>
  <text x="600" y="436" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" fill="#c2321f">same keyword, different meaning: counter rate vs per-second line count</text>
  <line x1="600" y1="378" x2="600" y2="400" stroke="#c2321f" stroke-width="3" marker-end="url(#ahr)"/>

  <!-- ============ ROW 3: selector / input ============ -->
  <!-- PromQL metric selector -->
  <rect x="40" y="510" width="500" height="120" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="64" y="546" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" fill="#3a352c">metric selector</text>
  <text x="64" y="582" font-family="ui-monospace, monospace" font-size="19" fill="#141310">http_requests_total</text>
  <text x="64" y="612" font-family="ui-monospace, monospace" font-size="19" fill="#141310">{job="api"}</text>

  <!-- LogQL stream selector + pipeline -->
  <rect x="660" y="510" width="500" height="120" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="684" y="546" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" fill="#3a352c">stream selector + parser</text>
  <text x="684" y="582" font-family="ui-monospace, monospace" font-size="19" fill="#141310">{job="api"}</text>
  <text x="684" y="612" font-family="ui-monospace, monospace" font-size="19" fill="#141310">| logfmt</text>

  <!-- Arrow: metric selector <-> stream selector (gray: overlaps but not interchangeable) -->
  <line x1="544" y1="570" x2="656" y2="570" stroke="#9c968a" stroke-width="3" marker-end="url(#ahg)" marker-start="url(#ahg)"/>
  <text x="600" y="560" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#6b675f">+ | logfmt</text>

  <!-- Footnote: full queries -->
  <text x="40" y="676" font-family="ui-monospace, monospace" font-size="17" fill="#524f48">PromQL:  sum by (status) (rate(http_requests_total{job="api"}[5m]))</text>
  <text x="40" y="700" font-family="ui-monospace, monospace" font-size="17" fill="#524f48">LogQL:   sum by (status) (rate({job="api"} | logfmt [5m]))</text>
</svg>
