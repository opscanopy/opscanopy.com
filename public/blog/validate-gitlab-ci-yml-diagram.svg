<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="A validation pipeline flow: paste .gitlab-ci.yml, parse YAML, run structural checks, then show valid or a list of errors">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#4a8c3f"/>
    </marker>
    <marker id="ahr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#c2321f"/>
    </marker>
  </defs>

  <rect width="1200" height="620" rx="20" fill="#ffffff" stroke="#e6e1d6" stroke-width="2"/>

  <text x="48" y="62" font-family="ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="700" fill="#141310">What a .gitlab-ci.yml validator checks</text>

  <!-- Box 1: paste .gitlab-ci.yml -->
  <rect x="48" y="270" width="220" height="92" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="158" y="305" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" fill="#3a352c">paste</text>
  <text x="158" y="335" text-anchor="middle" font-family="ui-monospace, monospace" font-size="19" fill="#141310">.gitlab-ci.yml</text>

  <!-- Arrow 1 -> 2 -->
  <line x1="268" y1="316" x2="334" y2="316" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>

  <!-- Box 2: parse YAML -->
  <rect x="340" y="270" width="180" height="92" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="430" y="312" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" fill="#3a352c">parse</text>
  <text x="430" y="338" text-anchor="middle" font-family="ui-monospace, monospace" font-size="19" fill="#141310">YAML</text>

  <!-- Arrow 2 -> 3 -->
  <line x1="520" y1="316" x2="586" y2="316" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>

  <!-- Box 3: structural checks (taller) -->
  <rect x="592" y="216" width="320" height="200" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="612" y="252" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="700" fill="#3a352c">structural checks</text>
  <line x1="612" y1="264" x2="892" y2="264" stroke="#e6e1d6" stroke-width="2"/>

  <text x="612" y="296" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#3a352c">&#8226; <tspan font-family="ui-monospace, monospace" font-size="17" fill="#141310">stages</tspan> defined</text>
  <text x="612" y="328" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#3a352c">&#8226; every job has a <tspan font-family="ui-monospace, monospace" font-size="17" fill="#141310">script</tspan></text>
  <text x="612" y="360" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#3a352c">&#8226; <tspan font-family="ui-monospace, monospace" font-size="17" fill="#141310">needs</tspan> / <tspan font-family="ui-monospace, monospace" font-size="17" fill="#141310">rules</tspan> valid</text>
  <text x="612" y="392" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#3a352c">&#8226; <tspan font-family="ui-monospace, monospace" font-size="17" fill="#141310">extends</tspan> resolves</text>

  <!-- Branch arrows to outcomes -->
  <!-- to valid (up) -->
  <path d="M912 280 L980 280 L980 150 L1046 150" fill="none" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>
  <!-- to errors (down) -->
  <path d="M912 352 L980 352 L980 482 L1046 482" fill="none" stroke="#c2321f" stroke-width="3" marker-end="url(#ahr)"/>

  <!-- Outcome: valid (green) -->
  <rect x="1052" y="108" width="100" height="84" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
  <text x="1102" y="156" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="700" fill="#4a8c3f">valid</text>

  <!-- Outcome: errors listed (red) -->
  <rect x="1012" y="440" width="140" height="84" rx="12" fill="#f6ddd6" stroke="#c2321f" stroke-width="2"/>
  <text x="1082" y="476" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="700" fill="#c2321f">errors</text>
  <text x="1082" y="502" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" fill="#c2321f">listed</text>

  <!-- Branch labels -->
  <text x="990" y="222" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#4a8c3f">pass</text>
  <text x="990" y="420" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#c2321f">fail</text>
</svg>
