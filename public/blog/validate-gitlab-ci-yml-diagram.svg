<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" role="img" aria-label="A validation pipeline flow: paste .gitlab-ci.yml, parse YAML, run structural checks, then show valid or a list of errors">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#10b981"/>
    </marker>
    <marker id="ahr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="1200" height="620" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <text x="48" y="62" font-family="ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="700" fill="#0f172a">What a .gitlab-ci.yml validator checks</text>

  <!-- Box 1: paste .gitlab-ci.yml -->
  <rect x="48" y="270" width="220" height="92" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="158" y="305" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" fill="#334155">paste</text>
  <text x="158" y="335" text-anchor="middle" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">.gitlab-ci.yml</text>

  <!-- Arrow 1 -> 2 -->
  <line x1="268" y1="316" x2="334" y2="316" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>

  <!-- Box 2: parse YAML -->
  <rect x="340" y="270" width="180" height="92" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="430" y="312" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" fill="#334155">parse</text>
  <text x="430" y="338" text-anchor="middle" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">YAML</text>

  <!-- Arrow 2 -> 3 -->
  <line x1="520" y1="316" x2="586" y2="316" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>

  <!-- Box 3: structural checks (taller) -->
  <rect x="592" y="216" width="320" height="200" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="612" y="252" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="700" fill="#334155">structural checks</text>
  <line x1="612" y1="264" x2="892" y2="264" stroke="#e2e8f0" stroke-width="2"/>

  <text x="612" y="296" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#334155">&#8226; <tspan font-family="ui-monospace, monospace" font-size="17" fill="#0f172a">stages</tspan> defined</text>
  <text x="612" y="328" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#334155">&#8226; every job has a <tspan font-family="ui-monospace, monospace" font-size="17" fill="#0f172a">script</tspan></text>
  <text x="612" y="360" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#334155">&#8226; <tspan font-family="ui-monospace, monospace" font-size="17" fill="#0f172a">needs</tspan> / <tspan font-family="ui-monospace, monospace" font-size="17" fill="#0f172a">rules</tspan> valid</text>
  <text x="612" y="392" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#334155">&#8226; <tspan font-family="ui-monospace, monospace" font-size="17" fill="#0f172a">extends</tspan> resolves</text>

  <!-- Branch arrows to outcomes -->
  <!-- to valid (up) -->
  <path d="M912 280 L980 280 L980 150 L1046 150" fill="none" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>
  <!-- to errors (down) -->
  <path d="M912 352 L980 352 L980 482 L1046 482" fill="none" stroke="#ef4444" stroke-width="3" marker-end="url(#ahr)"/>

  <!-- Outcome: valid (green) -->
  <rect x="1052" y="108" width="100" height="84" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="1102" y="156" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="700" fill="#10b981">valid</text>

  <!-- Outcome: errors listed (red) -->
  <rect x="1012" y="440" width="140" height="84" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="1082" y="476" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="700" fill="#ef4444">errors</text>
  <text x="1082" y="502" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" fill="#ef4444">listed</text>

  <!-- Branch labels -->
  <text x="990" y="222" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#10b981">pass</text>
  <text x="990" y="420" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#ef4444">fail</text>
</svg>
