<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-label="The five fields of a cron expression labelled minute, hour, day of month, month and day of week, with step and range annotations">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end"><path d="M0 0 L10 5 L0 10 z" fill="#10b981"/></marker>
    <marker id="ahr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end"><path d="M0 0 L10 5 L0 10 z" fill="#ef4444"/></marker>
    <marker id="ahg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end"><path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="1200" height="660" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <text x="48" y="64" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Anatomy of a cron expression</text>
  <text x="48" y="98" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#64748b">*/15 9-17 * * 1-5</text>

  <!-- Field 1: minute (*/15) -->
  <rect x="48" y="150" width="190" height="78" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="143" y="200" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="32" fill="#0f172a">*/15</text>
  <text x="143" y="256" text-anchor="middle" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#334155">minute</text>
  <text x="143" y="282" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#64748b">(0–59)</text>

  <!-- Field 2: hour (9-17) -->
  <rect x="258" y="150" width="190" height="78" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="353" y="200" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="32" fill="#0f172a">9-17</text>
  <text x="353" y="256" text-anchor="middle" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#334155">hour</text>
  <text x="353" y="282" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#64748b">(0–23)</text>

  <!-- Field 3: day of month (*) -->
  <rect x="468" y="150" width="190" height="78" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="563" y="200" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="32" fill="#0f172a">*</text>
  <text x="563" y="256" text-anchor="middle" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#334155">day of month</text>
  <text x="563" y="282" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#64748b">(1–31)</text>

  <!-- Field 4: month (*) -->
  <rect x="678" y="150" width="190" height="78" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="773" y="200" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="32" fill="#0f172a">*</text>
  <text x="773" y="256" text-anchor="middle" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#334155">month</text>
  <text x="773" y="282" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#64748b">(1–12)</text>

  <!-- Field 5: day of week (1-5) -->
  <rect x="888" y="150" width="264" height="78" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="1020" y="200" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="32" fill="#0f172a">1-5</text>
  <text x="1020" y="256" text-anchor="middle" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#334155">day of week</text>
  <text x="1020" y="282" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#64748b">(0–6, Sun=0)</text>

  <!-- Step annotation for */15 -->
  <line x1="143" y1="420" x2="143" y2="232" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>
  <rect x="48" y="420" width="320" height="86" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="64" y="452" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" font-weight="700" fill="#334155">Step</text>
  <text x="64" y="480" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#0f172a">*/15</text>
  <text x="148" y="480" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="19" fill="#334155">= every 15th minute</text>
  <text x="64" y="500" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#64748b">0, 15, 30, 45</text>

  <!-- Range annotation for 9-17 -->
  <line x1="353" y1="552" x2="353" y2="232" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>
  <rect x="412" y="420" width="320" height="86" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="428" y="452" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" font-weight="700" fill="#334155">Range</text>
  <text x="428" y="480" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#0f172a">9-17</text>
  <text x="512" y="480" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="19" fill="#334155">= hours 9 through 17</text>
  <text x="428" y="500" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#64748b">9 AM – 5 PM, inclusive</text>

  <!-- Range annotation for 1-5 -->
  <line x1="1020" y1="552" x2="1020" y2="232" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>
  <rect x="776" y="420" width="376" height="86" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="792" y="452" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" font-weight="700" fill="#334155">Range</text>
  <text x="792" y="480" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#0f172a">1-5</text>
  <text x="864" y="480" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="19" fill="#334155">= Monday through Friday</text>
  <text x="792" y="500" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#64748b">weekdays only</text>

  <!-- Plain-English summary -->
  <rect x="48" y="556" width="1104" height="72" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="72" y="588" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" font-weight="700" fill="#0f172a">Reads as:</text>
  <text x="180" y="588" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#334155">every 15 minutes, between 9 AM and 5 PM, Monday through Friday.</text>
  <text x="72" y="614" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17" fill="#64748b">A field of * matches every value, so day-of-month and month here mean "any".</text>
</svg>
