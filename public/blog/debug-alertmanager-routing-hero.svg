<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Debugging Alertmanager routing — OpsCanopy observability guide">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8a5f9e"/><stop offset="1" stop-color="#5f4a78"/></linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 H0 V40" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/></pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="320" fill="url(#sheen)"/>
  <circle cx="980" cy="315" r="210" fill="#ffffff" fill-opacity="0.08"/>
  <text x="80" y="150" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="26" font-weight="700" letter-spacing="5" fill="#ffffff" fill-opacity="0.85">OBSERVABILITY</text>
  <text font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="68" font-weight="800" fill="#ffffff"><tspan x="80" y="300">Debugging Alert</tspan><tspan x="80" y="384">Routing</tspan></text>
  <text x="80" y="560" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" fill="#ffffff" fill-opacity="0.72">opscanopy.com</text>
  <g transform="translate(980,315)" stroke="#ffffff" stroke-opacity="0.95" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Alert bell (left) -->
    <path d="M-104 -84 v-12"/>
    <circle cx="-104" cy="-100" r="8" fill="#ffffff" fill-opacity="0.9" stroke="none"/>
    <path d="M-104 -84 C -150 -84 -152 -44 -152 -16 C -152 14 -164 26 -164 26 H -44 C -44 26 -56 14 -56 -16 C -56 -44 -58 -84 -104 -84 Z"/>
    <path d="M-120 26 a16 16 0 0 0 32 0"/>
    <!-- Branching path (right): one line splitting into two -->
    <path d="M-6 0 H 50"/>
    <circle cx="50" cy="0" r="9" fill="#ffffff" fill-opacity="0.9" stroke="none"/>
    <path d="M50 0 C 92 0 92 -62 134 -62"/>
    <path d="M50 0 C 92 0 92 62 134 62"/>
    <circle cx="138" cy="-62" r="11" fill="#ffffff" fill-opacity="0.9" stroke="none"/>
    <circle cx="138" cy="62" r="11" fill="#ffffff" fill-opacity="0.9" stroke="none"/>
  </g>
</svg>
