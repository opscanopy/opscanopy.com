<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="A GitHub Actions workflow annotated with security mistakes: pull_request_target, an unpinned action, overly broad permissions and script injection">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#4a8c3f"/>
    </marker>
    <marker id="ahr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#c2321f"/>
    </marker>
    <marker id="ahg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#9c968a"/>
    </marker>
  </defs>

  <!-- Background panel -->
  <rect width="1200" height="720" rx="20" fill="#ffffff" stroke="#e6e1d6" stroke-width="2"/>

  <!-- Title -->
  <text x="40" y="58" font-family="ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="700" fill="#141310">A workflow that passes the linter and fails security</text>

  <!-- Code panel -->
  <rect x="40" y="86" width="620" height="600" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>

  <!-- File name tab -->
  <text x="64" y="122" font-family="ui-monospace, monospace" font-size="19" font-weight="700" fill="#3a352c">.github/workflows/ci.yml</text>
  <line x1="64" y1="134" x2="636" y2="134" stroke="#e6e1d6" stroke-width="2"/>

  <!-- Code lines. Line height ~36px starting y=172 -->
  <!-- line 1: trigger (bad) -->
  <text x="60" y="172" font-family="ui-monospace, monospace" font-size="19" fill="#9c968a" xml:space="preserve">1  </text>
  <text x="104" y="172" font-family="ui-monospace, monospace" font-size="19" fill="#141310" xml:space="preserve">on: </text>
  <rect x="148" y="156" width="200" height="24" rx="5" fill="#f6ddd6" stroke="#c2321f" stroke-width="1.5"/>
  <text x="155" y="172" font-family="ui-monospace, monospace" font-size="19" fill="#9c2114" xml:space="preserve">pull_request_target</text>

  <!-- line 2: permissions (bad) -->
  <text x="60" y="208" font-family="ui-monospace, monospace" font-size="19" fill="#9c968a" xml:space="preserve">2  </text>
  <text x="104" y="208" font-family="ui-monospace, monospace" font-size="19" fill="#141310" xml:space="preserve">permissions: </text>
  <rect x="252" y="192" width="106" height="24" rx="5" fill="#f6ddd6" stroke="#c2321f" stroke-width="1.5"/>
  <text x="259" y="208" font-family="ui-monospace, monospace" font-size="19" fill="#9c2114" xml:space="preserve">write-all</text>

  <!-- line 3 -->
  <text x="60" y="244" font-family="ui-monospace, monospace" font-size="19" fill="#9c968a" xml:space="preserve">3  </text>
  <text x="104" y="244" font-family="ui-monospace, monospace" font-size="19" fill="#141310" xml:space="preserve">jobs:</text>

  <!-- line 4 -->
  <text x="60" y="280" font-family="ui-monospace, monospace" font-size="19" fill="#9c968a" xml:space="preserve">4  </text>
  <text x="104" y="280" font-family="ui-monospace, monospace" font-size="19" fill="#141310" xml:space="preserve">  build:</text>

  <!-- line 5 -->
  <text x="60" y="316" font-family="ui-monospace, monospace" font-size="19" fill="#9c968a" xml:space="preserve">5  </text>
  <text x="104" y="316" font-family="ui-monospace, monospace" font-size="19" fill="#141310" xml:space="preserve">    runs-on: ubuntu-latest</text>

  <!-- line 6 -->
  <text x="60" y="352" font-family="ui-monospace, monospace" font-size="19" fill="#9c968a" xml:space="preserve">6  </text>
  <text x="104" y="352" font-family="ui-monospace, monospace" font-size="19" fill="#141310" xml:space="preserve">    steps:</text>

  <!-- line 7: unpinned action (bad) -->
  <text x="60" y="388" font-family="ui-monospace, monospace" font-size="19" fill="#9c968a" xml:space="preserve">7  </text>
  <text x="104" y="388" font-family="ui-monospace, monospace" font-size="19" fill="#141310" xml:space="preserve">      - uses: tj-actions/changed-files</text>
  <rect x="558" y="372" width="58" height="24" rx="5" fill="#f6ddd6" stroke="#c2321f" stroke-width="1.5"/>
  <text x="565" y="388" font-family="ui-monospace, monospace" font-size="19" fill="#9c2114" xml:space="preserve">@main</text>

  <!-- line 8: checkout PR head (part of bad #1) -->
  <text x="60" y="424" font-family="ui-monospace, monospace" font-size="19" fill="#9c968a" xml:space="preserve">8  </text>
  <text x="104" y="424" font-family="ui-monospace, monospace" font-size="19" fill="#141310" xml:space="preserve">      - uses: actions/checkout@v4</text>

  <!-- line 9: ref untrusted (bad #1) -->
  <text x="60" y="460" font-family="ui-monospace, monospace" font-size="19" fill="#9c968a" xml:space="preserve">9  </text>
  <text x="104" y="460" font-family="ui-monospace, monospace" font-size="19" fill="#141310" xml:space="preserve">        with:</text>

  <!-- line 10: ref value -->
  <text x="60" y="496" font-family="ui-monospace, monospace" font-size="19" fill="#9c968a" xml:space="preserve">10 </text>
  <text x="104" y="496" font-family="ui-monospace, monospace" font-size="19" fill="#141310" xml:space="preserve">          ref: </text>
  <rect x="220" y="480" width="350" height="24" rx="5" fill="#f6ddd6" stroke="#c2321f" stroke-width="1.5"/>
  <text x="227" y="496" font-family="ui-monospace, monospace" font-size="18" fill="#9c2114" xml:space="preserve">${{ ...pull_request.head.sha }}</text>

  <!-- line 11 -->
  <text x="60" y="532" font-family="ui-monospace, monospace" font-size="19" fill="#9c968a" xml:space="preserve">11 </text>
  <text x="104" y="532" font-family="ui-monospace, monospace" font-size="19" fill="#141310" xml:space="preserve">      - run: npm install &amp;&amp; npm run build</text>

  <!-- line 12 blank -->
  <text x="60" y="568" font-family="ui-monospace, monospace" font-size="19" fill="#9c968a" xml:space="preserve">12 </text>

  <!-- line 13: script injection (bad #4) -->
  <text x="60" y="604" font-family="ui-monospace, monospace" font-size="19" fill="#9c968a" xml:space="preserve">13 </text>
  <text x="104" y="604" font-family="ui-monospace, monospace" font-size="19" fill="#141310" xml:space="preserve">      - run: echo "PR:</text>

  <!-- line 14: interpolated title -->
  <text x="60" y="640" font-family="ui-monospace, monospace" font-size="19" fill="#9c968a" xml:space="preserve">14 </text>
  <rect x="104" y="624" width="408" height="24" rx="5" fill="#f6ddd6" stroke="#c2321f" stroke-width="1.5"/>
  <text x="111" y="640" font-family="ui-monospace, monospace" font-size="18" fill="#9c2114" xml:space="preserve">          ${{ github.event.pull_request.title }}"</text>

  <!-- ===================== Callout 1: pull_request_target ===================== -->
  <rect x="700" y="92" width="460" height="118" rx="12" fill="#f6ddd6" stroke="#c2321f" stroke-width="2"/>
  <text x="722" y="124" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="700" fill="#9c2114">1. pull_request_target + PR head</text>
  <text x="722" y="154" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" fill="#3a352c">Checks out and runs untrusted fork</text>
  <text x="722" y="180" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" fill="#3a352c">code with repo secrets in scope.</text>
  <line x1="700" y1="150" x2="356" y2="168" stroke="#c2321f" stroke-width="1.5" marker-end="url(#ahr)"/>
  <line x1="722" y1="190" x2="430" y2="492" stroke="#c2321f" stroke-width="1.5" marker-end="url(#ahr)"/>

  <!-- ===================== Callout 2: write-all permissions ===================== -->
  <rect x="700" y="232" width="460" height="118" rx="12" fill="#f6ddd6" stroke="#c2321f" stroke-width="2"/>
  <text x="722" y="264" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="700" fill="#9c2114">2. Over-broad permissions</text>
  <text x="722" y="294" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" fill="#3a352c">write-all lets a compromised step</text>
  <text x="722" y="320" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" fill="#3a352c">push, release, or open PRs.</text>
  <line x1="700" y1="266" x2="362" y2="204" stroke="#c2321f" stroke-width="1.5" marker-end="url(#ahr)"/>

  <!-- ===================== Callout 3: unpinned action ===================== -->
  <rect x="700" y="372" width="460" height="118" rx="12" fill="#f6ddd6" stroke="#c2321f" stroke-width="2"/>
  <text x="722" y="404" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="700" fill="#9c2114">3. Action pinned to a tag</text>
  <text x="722" y="434" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" fill="#3a352c">@main is mutable. Pin to a full</text>
  <text x="722" y="460" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" fill="#3a352c">40-char commit SHA instead.</text>
  <line x1="700" y1="406" x2="620" y2="384" stroke="#c2321f" stroke-width="1.5" marker-end="url(#ahr)"/>

  <!-- ===================== Callout 4: script injection ===================== -->
  <rect x="700" y="512" width="460" height="138" rx="12" fill="#f6ddd6" stroke="#c2321f" stroke-width="2"/>
  <text x="722" y="544" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="700" fill="#9c2114">4. Script injection</text>
  <text x="722" y="574" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" fill="#3a352c">The PR title is spliced into the</text>
  <text x="722" y="600" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" fill="#3a352c">shell before it runs. Pass it via</text>
  <text x="722" y="626" font-family="ui-monospace, monospace" font-size="19" fill="#141310" xml:space="preserve">env:</text>
  <text x="772" y="626" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" fill="#3a352c">so it arrives as data.</text>
  <line x1="700" y1="600" x2="516" y2="636" stroke="#c2321f" stroke-width="1.5" marker-end="url(#ahr)"/>

  <!-- Footnote: linter blind spot -->
  <text x="40" y="708" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#6b675f">All four parse as valid YAML — a syntax linter sails right past every one.</text>
</svg>
