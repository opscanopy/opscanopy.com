<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="The relabel pipeline for one rule: input labels, join the source_labels with the separator, match the regex, apply the action, and produce the output labels">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#10b981"/>
    </marker>
  </defs>

  <rect width="1200" height="640" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Title -->
  <text x="40" y="58" font-family="ui-sans-serif, system-ui" font-size="30" font-weight="700" fill="#0f172a">How one relabel rule transforms a target</text>

  <!-- ============ STAGE 1: INPUT LABELS ============ -->
  <rect x="40" y="120" width="290" height="190" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="60" y="152" font-family="ui-sans-serif, system-ui" font-size="21" fill="#334155">Input labels</text>
  <text x="60" y="192" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">__meta_kubernetes</text>
  <text x="60" y="216" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">_pod_label_app</text>
  <text x="60" y="254" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">env</text>
  <text x="60" y="288" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">instance</text>

  <!-- Arrow 1 -->
  <line x1="334" y1="215" x2="384" y2="215" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>

  <!-- ============ STAGE 2: JOIN SOURCE_LABELS ============ -->
  <rect x="392" y="120" width="290" height="190" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="412" y="152" font-family="ui-sans-serif, system-ui" font-size="21" fill="#334155">Join source_labels</text>
  <text x="412" y="180" font-family="ui-sans-serif, system-ui" font-size="21" fill="#334155">with separator</text>
  <text x="412" y="222" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">separator: ";"</text>
  <text x="412" y="266" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">app;prod;</text>
  <text x="412" y="290" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">10.0.0.5:9090</text>

  <!-- Arrow 2 -->
  <line x1="686" y1="215" x2="736" y2="215" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>

  <!-- ============ STAGE 3: MATCH REGEX ============ -->
  <rect x="744" y="120" width="290" height="190" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="764" y="152" font-family="ui-sans-serif, system-ui" font-size="21" fill="#334155">Match the regex</text>
  <text x="764" y="200" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">regex: (.+)</text>
  <text x="764" y="244" font-family="ui-sans-serif, system-ui" font-size="21" fill="#334155">Captures the</text>
  <text x="764" y="272" font-family="ui-sans-serif, system-ui" font-size="21" fill="#334155">joined value</text>

  <!-- Arrow 3: down from regex box to action box -->
  <line x1="889" y1="314" x2="889" y2="372" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>

  <!-- ============ STAGE 4: ACTION (emerald, with chips) ============ -->
  <rect x="640" y="380" width="394" height="220" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="660" y="412" font-family="ui-sans-serif, system-ui" font-size="21" fill="#334155">Apply the action</text>

  <!-- Chip: replace -->
  <rect x="660" y="430" width="160" height="34" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
  <text x="668" y="453" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">replace</text>

  <!-- Chip: keep -->
  <rect x="834" y="430" width="160" height="34" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
  <text x="842" y="453" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">keep</text>

  <!-- Chip: drop -->
  <rect x="660" y="474" width="160" height="34" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
  <text x="668" y="497" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">drop</text>

  <!-- Chip: labelmap -->
  <rect x="834" y="474" width="160" height="34" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
  <text x="842" y="497" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">labelmap</text>

  <!-- Chip: hashmod -->
  <rect x="660" y="518" width="160" height="34" rx="8" fill="#ffffff" stroke="#10b981" stroke-width="2"/>
  <text x="668" y="541" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">hashmod</text>

  <text x="844" y="540" font-family="ui-sans-serif, system-ui" font-size="19" fill="#334155">one of these</text>
  <text x="844" y="563" font-family="ui-sans-serif, system-ui" font-size="19" fill="#334155">runs per rule</text>

  <!-- Arrow 4: left from action box to output box -->
  <line x1="638" y1="490" x2="588" y2="490" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>

  <!-- ============ STAGE 5: OUTPUT LABELS (emerald) ============ -->
  <rect x="40" y="380" width="540" height="220" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="60" y="412" font-family="ui-sans-serif, system-ui" font-size="21" fill="#334155">Output labels</text>

  <text x="60" y="452" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">app = "checkout"</text>
  <text x="60" y="484" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">env = "prod"</text>
  <text x="60" y="516" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">instance = "10.0.0.5:9090"</text>

  <text x="60" y="556" font-family="ui-sans-serif, system-ui" font-size="19" fill="#334155">target_label receives the</text>
  <text x="60" y="579" font-family="ui-sans-serif, system-ui" font-size="19" fill="#334155">replacement; the rest pass through</text>
</svg>
