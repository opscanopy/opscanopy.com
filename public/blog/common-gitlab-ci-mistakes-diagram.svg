<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-label="A short broken .gitlab-ci.yml snippet with red callout bubbles pointing at an undefined stage, a job with no script, and a bad needs reference">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#10b981"/>
    </marker>
    <marker id="ahr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background panel -->
  <rect width="1200" height="660" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Title -->
  <text x="40" y="58" font-family="ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Common .gitlab-ci.yml mistakes</text>

  <!-- Code panel -->
  <rect x="40" y="90" width="640" height="500" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>

  <!-- File name tab -->
  <text x="64" y="126" font-family="ui-monospace, monospace" font-size="19" font-weight="700" fill="#334155">.gitlab-ci.yml</text>
  <line x1="64" y1="138" x2="656" y2="138" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Code lines (monospace). Line height ~36px starting y=176 -->
  <!-- line 1 -->
  <text x="64" y="176" font-family="ui-monospace, monospace" font-size="19" fill="#94a3b8" xml:space="preserve">1  </text>
  <text x="104" y="176" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a" xml:space="preserve">stages: [build, test]</text>

  <!-- line 2 blank -->
  <text x="64" y="212" font-family="ui-monospace, monospace" font-size="19" fill="#94a3b8" xml:space="preserve">2  </text>

  <!-- line 3 -->
  <text x="64" y="248" font-family="ui-monospace, monospace" font-size="19" fill="#94a3b8" xml:space="preserve">3  </text>
  <text x="104" y="248" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a" xml:space="preserve">deploy:</text>

  <!-- line 4 (undefined stage release) -->
  <text x="64" y="284" font-family="ui-monospace, monospace" font-size="19" fill="#94a3b8" xml:space="preserve">4  </text>
  <text x="104" y="284" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a" xml:space="preserve">  stage: </text>
  <rect x="232" y="268" width="84" height="24" rx="5" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="240" y="284" font-family="ui-monospace, monospace" font-size="19" fill="#b91c1c" xml:space="preserve">release</text>

  <!-- line 5 -->
  <text x="64" y="320" font-family="ui-monospace, monospace" font-size="19" fill="#94a3b8" xml:space="preserve">5  </text>
  <text x="104" y="320" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a" xml:space="preserve">  script:</text>

  <!-- line 6 -->
  <text x="64" y="356" font-family="ui-monospace, monospace" font-size="19" fill="#94a3b8" xml:space="preserve">6  </text>
  <text x="104" y="356" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a" xml:space="preserve">    - ./deploy.sh</text>

  <!-- line 7 blank -->
  <text x="64" y="392" font-family="ui-monospace, monospace" font-size="19" fill="#94a3b8" xml:space="preserve">7  </text>

  <!-- line 8 (lint job, no script) -->
  <text x="64" y="428" font-family="ui-monospace, monospace" font-size="19" fill="#94a3b8" xml:space="preserve">8  </text>
  <rect x="100" y="412" width="62" height="24" rx="5" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="104" y="428" font-family="ui-monospace, monospace" font-size="19" fill="#b91c1c" xml:space="preserve">lint:</text>

  <!-- line 9 -->
  <text x="64" y="464" font-family="ui-monospace, monospace" font-size="19" fill="#94a3b8" xml:space="preserve">9  </text>
  <text x="104" y="464" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a" xml:space="preserve">  stage: test</text>

  <!-- line 10 (missing script - the job ends with no script key) -->
  <text x="60" y="500" font-family="ui-monospace, monospace" font-size="19" fill="#94a3b8" xml:space="preserve">10 </text>
  <text x="104" y="500" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a" xml:space="preserve">unit:</text>

  <!-- line 11 (bad needs) -->
  <text x="60" y="536" font-family="ui-monospace, monospace" font-size="19" fill="#94a3b8" xml:space="preserve">11 </text>
  <text x="104" y="536" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a" xml:space="preserve">  needs: [</text>
  <rect x="244" y="520" width="74" height="24" rx="5" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="250" y="536" font-family="ui-monospace, monospace" font-size="19" fill="#b91c1c" xml:space="preserve">"nope"</text>
  <text x="320" y="536" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a" xml:space="preserve">]</text>

  <!-- line 12 -->
  <text x="60" y="572" font-family="ui-monospace, monospace" font-size="19" fill="#94a3b8" xml:space="preserve">12 </text>
  <text x="104" y="572" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a" xml:space="preserve">  script: [make test]</text>

  <!-- ===================== Callout 1: undefined stage ===================== -->
  <rect x="730" y="118" width="430" height="120" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="752" y="152" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="700" fill="#b91c1c">1. Undefined stage</text>
  <text x="752" y="184" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" fill="#334155" xml:space="preserve">stage: </text>
  <text x="816" y="184" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a" xml:space="preserve">release</text>
  <text x="900" y="184" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" fill="#334155">is not in</text>
  <text x="752" y="212" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" fill="#334155">the </text>
  <text x="788" y="212" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a" xml:space="preserve">stages:</text>
  <text x="876" y="212" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" fill="#334155">list above.</text>
  <!-- leader line to "release" on line 4 -->
  <line x1="730" y1="190" x2="324" y2="280" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ahr)"/>

  <!-- ===================== Callout 2: missing script ===================== -->
  <rect x="730" y="300" width="430" height="120" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="752" y="334" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="700" fill="#b91c1c">2. Missing script</text>
  <text x="752" y="366" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" fill="#334155" xml:space="preserve">Job </text>
  <text x="790" y="366" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a" xml:space="preserve">lint:</text>
  <text x="852" y="366" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" fill="#334155">defines no</text>
  <text x="752" y="394" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a" xml:space="preserve">script</text>
  <text x="826" y="394" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" fill="#334155">- invalid job.</text>
  <!-- leader line to "lint:" on line 8 -->
  <line x1="730" y1="372" x2="170" y2="424" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ahr)"/>

  <!-- ===================== Callout 3: bad needs target ===================== -->
  <rect x="730" y="482" width="430" height="120" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="752" y="516" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" font-weight="700" fill="#b91c1c">3. Bad needs reference</text>
  <text x="752" y="548" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a" xml:space="preserve">needs: ["nope"]</text>
  <text x="752" y="576" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" fill="#334155">points to a job that</text>
  <text x="752" y="600" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" fill="#334155">does not exist.</text>
  <!-- leader line to "nope" on line 11 -->
  <line x1="730" y1="540" x2="326" y2="532" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ahr)"/>
</svg>
