<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="A Loki alert rule unit test loop: synthetic log streams evaluated at a chosen time and asserted against the expected alerts">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#10b981"/>
    </marker>
    <marker id="ahr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#ef4444"/>
    </marker>
    <marker id="ahg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background panel -->
  <rect width="1200" height="640" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <!-- Title -->
  <text x="40" y="58" font-family="ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="700" fill="#0f172a">The Loki alert-rule test loop</text>
  <text x="40" y="90" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" fill="#64748b">A promtool-style model, but logs in instead of series</text>

  <!-- ============ STEP 1: input_streams ============ -->
  <rect x="40" y="140" width="300" height="230" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="60" y="172" font-family="ui-monospace, monospace" font-size="19" fill="#0f172a">input_streams</text>
  <text x="60" y="200" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17" fill="#64748b">synthetic log lines</text>
  <text x="60" y="236" font-family="ui-monospace, monospace" font-size="16" fill="#0f172a">{app="api", env="prod"}</text>
  <text x="60" y="272" font-family="ui-monospace, monospace" font-size="15" fill="#334155">10:01:10  panic: nil map</text>
  <text x="60" y="298" font-family="ui-monospace, monospace" font-size="15" fill="#334155">10:02:40  panic: nil map</text>
  <text x="60" y="334" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#64748b">two panic lines in the window</text>

  <!-- Arrow 1 -> 2 -->
  <line x1="340" y1="255" x2="392" y2="255" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>

  <!-- ============ STEP 2: evaluate the LogQL rule ============ -->
  <rect x="396" y="140" width="320" height="230" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="416" y="172" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" font-weight="700" fill="#0f172a">evaluate the LogQL rule</text>
  <text x="416" y="204" font-family="ui-monospace, monospace" font-size="14" fill="#0f172a">count_over_time(</text>
  <text x="416" y="228" font-family="ui-monospace, monospace" font-size="14" fill="#0f172a">  {app="api"} |= "panic"</text>
  <text x="416" y="252" font-family="ui-monospace, monospace" font-size="14" fill="#0f172a">  [5m]) &gt; 1</text>
  <text x="416" y="296" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#64748b">at</text>
  <text x="416" y="324" font-family="ui-monospace, monospace" font-size="15" fill="#0f172a">eval_time:</text>
  <text x="416" y="348" font-family="ui-monospace, monospace" font-size="15" fill="#0f172a">2026-06-08T10:05:00Z</text>

  <!-- Arrow 2 -> 3 -->
  <line x1="716" y1="255" x2="768" y2="255" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>

  <!-- ============ STEP 3: assert exp_alerts ============ -->
  <rect x="772" y="140" width="388" height="230" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="792" y="172" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" font-weight="700" fill="#0f172a">assert exp_alerts</text>
  <text x="792" y="204" font-family="ui-monospace, monospace" font-size="15" fill="#0f172a">alertname: PanicDetected</text>
  <text x="792" y="236" font-family="ui-monospace, monospace" font-size="15" fill="#0f172a">exp_labels:</text>
  <text x="792" y="260" font-family="ui-monospace, monospace" font-size="15" fill="#334155">  app: api  env: prod</text>
  <text x="792" y="284" font-family="ui-monospace, monospace" font-size="15" fill="#334155">  severity: critical</text>
  <text x="792" y="318" font-family="ui-monospace, monospace" font-size="15" fill="#0f172a">exp_annotations:</text>
  <text x="792" y="342" font-family="ui-monospace, monospace" font-size="14" fill="#334155">  summary: "Panic detected..."</text>

  <!-- Branch arrows from assert to pass / fail -->
  <!-- to PASS (green) -->
  <path d="M966 370 L966 430 L300 430 L300 478" fill="none" stroke="#10b981" stroke-width="3" marker-end="url(#ah)"/>
  <text x="640" y="422" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#10b981">alerts match exp_alerts</text>
  <!-- to FAIL (red) -->
  <path d="M966 370 L966 430 L900 430 L900 478" fill="none" stroke="#ef4444" stroke-width="3" marker-end="url(#ahr)"/>
  <text x="900" y="460" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#ef4444">mismatch</text>

  <!-- ============ PASS box ============ -->
  <rect x="120" y="482" width="360" height="110" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="140" y="520" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700" fill="#0f172a">pass</text>
  <text x="140" y="552" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17" fill="#334155">count_over_time(...) &gt; 1 is true;</text>
  <text x="140" y="576" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17" fill="#334155">PanicDetected emitted as expected</text>

  <!-- ============ FAIL box ============ -->
  <rect x="720" y="482" width="360" height="110" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="740" y="520" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700" fill="#0f172a">fail</text>
  <text x="740" y="552" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17" fill="#334155">one line, or one outside [5m]:</text>
  <text x="740" y="576" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17" fill="#334155">exp_alerts empty — guards both cases</text>
</svg>
