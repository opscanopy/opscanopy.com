<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="The 90-day path: five phases from Linux fundamentals to job-ready, with an incident mission capping every week">
  <defs>
    <marker id="ah90" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#4a8c3f"/>
    </marker>
  </defs>

  <!-- Background panel -->
  <rect width="1200" height="640" rx="20" fill="#ffffff" stroke="#e6e1d6" stroke-width="2"/>

  <!-- Title -->
  <text x="40" y="58" font-family="ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="700" fill="#141310">The 90-day path</text>
  <text x="40" y="90" font-family="ui-sans-serif, system-ui, sans-serif" font-size="19" fill="#6b675f">Each phase lets you debug the layer above it — and an incident mission caps every week</text>

  <!-- Phase 1: Linux -->
  <rect x="40" y="140" width="200" height="150" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
  <text x="60" y="176" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" letter-spacing="1.5" fill="#33652c">PHASE 1 · DAYS 1–21</text>
  <text x="60" y="212" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700" fill="#141310">Linux &amp; the</text>
  <text x="60" y="240" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700" fill="#141310">terminal</text>
  <text x="60" y="272" font-family="ui-monospace, monospace" font-size="14" fill="#3a352c">systemd · logs · ssh</text>

  <!-- Phase 2: Docker & CI -->
  <rect x="272" y="140" width="200" height="150" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="292" y="176" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" letter-spacing="1.5" fill="#524f48">PHASE 2 · DAYS 22–45</text>
  <text x="292" y="212" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700" fill="#141310">Docker &amp;</text>
  <text x="292" y="240" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700" fill="#141310">CI/CD</text>
  <text x="292" y="272" font-family="ui-monospace, monospace" font-size="14" fill="#3a352c">compose · Actions</text>

  <!-- Phase 3: AWS -->
  <rect x="504" y="140" width="200" height="150" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="524" y="176" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" letter-spacing="1.5" fill="#524f48">PHASE 3 · DAYS 46–65</text>
  <text x="524" y="212" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700" fill="#141310">AWS</text>
  <text x="524" y="272" font-family="ui-monospace, monospace" font-size="14" fill="#3a352c">IAM · VPC · Fargate</text>

  <!-- Phase 4: K8s & Terraform -->
  <rect x="736" y="140" width="200" height="150" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="756" y="176" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" letter-spacing="1.5" fill="#524f48">PHASE 4 · DAYS 66–85</text>
  <text x="756" y="212" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700" fill="#141310">Kubernetes &amp;</text>
  <text x="756" y="240" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700" fill="#141310">Terraform</text>
  <text x="756" y="272" font-family="ui-monospace, monospace" font-size="14" fill="#3a352c">k3s · Helm · IaC</text>

  <!-- Phase 5: Job-ready -->
  <rect x="968" y="140" width="192" height="150" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
  <text x="988" y="176" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" letter-spacing="1.5" fill="#33652c">PHASE 5 · DAYS 86–90</text>
  <text x="988" y="212" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700" fill="#141310">Job-ready</text>
  <text x="988" y="272" font-family="ui-monospace, monospace" font-size="14" fill="#3a352c">resume · interviews</text>

  <!-- Arrows between phases -->
  <line x1="240" y1="215" x2="264" y2="215" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah90)"/>
  <line x1="472" y1="215" x2="496" y2="215" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah90)"/>
  <line x1="704" y1="215" x2="728" y2="215" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah90)"/>
  <line x1="936" y1="215" x2="960" y2="215" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah90)"/>

  <!-- One app, three ways -->
  <rect x="40" y="330" width="1120" height="80" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="60" y="363" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="700" fill="#141310">One app, carried up the whole stack</text>
  <text x="60" y="392" font-family="ui-monospace, monospace" font-size="15" fill="#3a352c">linkstash: Project 1 — Docker (day 45)  →  Project 2 — AWS Fargate + RDS (day 65)  →  Project 3 — k3s via Terraform (day 85)</text>

  <!-- Missions strip -->
  <rect x="40" y="440" width="1120" height="160" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
  <text x="60" y="476" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17" font-weight="700" fill="#33652c">Ten playable incident missions — in a browser terminal, no setup</text>
  <text x="60" y="510" font-family="ui-monospace, monospace" font-size="15" fill="#141310">wk1 Server Down!   wk2 DNS Detective   wk3 Locked File   wk4 Docker Rescue   wk6 Broken Pipeline</text>
  <text x="60" y="540" font-family="ui-monospace, monospace" font-size="15" fill="#141310">wk7 AWS Bill Shock   wk8 Database Recovery   wk11 Kubernetes Chaos   wk12 Terraform Trouble</text>
  <text x="60" y="576" font-family="ui-monospace, monospace" font-size="15" font-weight="700" fill="#33652c">final boss · day 90 — The Midnight Outage: fix it upstream-first (aws → kubectl → dig)</text>
</svg>
