<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-label="A .env file and .env.example compared side by side, highlighting a key missing from the example and a stale leftover key">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#4a8c3f"/>
    </marker>
    <marker id="ahr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#c2321f"/>
    </marker>
    <marker id="ahg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#9c968a"/>
    </marker>
  </defs>

  <rect width="1200" height="660" rx="20" fill="#ffffff" stroke="#e6e1d6" stroke-width="2"/>

  <text x="48" y="58" font-family="ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="700" fill="#141310">.env vs .env.example: spotting drift</text>

  <!-- Column headers -->
  <text x="270" y="118" text-anchor="middle" font-family="ui-monospace, monospace" font-size="22" font-weight="700" fill="#141310">.env</text>
  <text x="270" y="144" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#3a352c">actual (local, gitignored)</text>

  <text x="930" y="118" text-anchor="middle" font-family="ui-monospace, monospace" font-size="22" font-weight="700" fill="#141310">.env.example</text>
  <text x="930" y="144" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#3a352c">committed (the contract)</text>

  <!-- ===== Row 1: DATABASE_URL (in both) ===== -->
  <rect x="48" y="172" width="444" height="56" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
  <text x="68" y="207" font-family="ui-monospace, monospace" font-size="19" fill="#141310">DATABASE_URL=postgres://localhost...</text>

  <rect x="708" y="172" width="444" height="56" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
  <text x="728" y="207" font-family="ui-monospace, monospace" font-size="19" fill="#141310">DATABASE_URL=</text>

  <line x1="492" y1="200" x2="708" y2="200" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>
  <g transform="translate(600,200)" stroke="#4a8c3f" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="0" cy="0" r="15" fill="#e2eeda"/><polyline points="-7,1 -2,6 8,-6"/></g>

  <!-- ===== Row 2: REDIS_URL (in both) ===== -->
  <rect x="48" y="246" width="444" height="56" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
  <text x="68" y="281" font-family="ui-monospace, monospace" font-size="19" fill="#141310">REDIS_URL=redis://localhost:6379</text>

  <rect x="708" y="246" width="444" height="56" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
  <text x="728" y="281" font-family="ui-monospace, monospace" font-size="19" fill="#141310">REDIS_URL=</text>

  <line x1="492" y1="274" x2="708" y2="274" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>
  <g transform="translate(600,274)" stroke="#4a8c3f" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="0" cy="0" r="15" fill="#e2eeda"/><polyline points="-7,1 -2,6 8,-6"/></g>

  <!-- ===== Row 3: STRIPE_SECRET_KEY (in both) ===== -->
  <rect x="48" y="320" width="444" height="56" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
  <text x="68" y="355" font-family="ui-monospace, monospace" font-size="19" fill="#141310">STRIPE_SECRET_KEY=sk_live_...</text>

  <rect x="708" y="320" width="444" height="56" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
  <text x="728" y="355" font-family="ui-monospace, monospace" font-size="19" fill="#141310">STRIPE_SECRET_KEY=</text>

  <line x1="492" y1="348" x2="708" y2="348" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>
  <g transform="translate(600,348)" stroke="#4a8c3f" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="0" cy="0" r="15" fill="#e2eeda"/><polyline points="-7,1 -2,6 8,-6"/></g>

  <!-- ===== Row 4: STRIPE_WEBHOOK_SECRET (in .env, MISSING from example = drift) ===== -->
  <rect x="48" y="394" width="444" height="56" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="68" y="429" font-family="ui-monospace, monospace" font-size="19" fill="#141310">STRIPE_WEBHOOK_SECRET=whsec_...</text>

  <!-- empty slot on the example side -->
  <rect x="708" y="394" width="444" height="56" rx="12" fill="#f6ddd6" stroke="#c2321f" stroke-width="2" stroke-dasharray="6 6"/>
  <text x="930" y="429" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-style="italic" fill="#c2321f">(not declared)</text>

  <line x1="492" y1="422" x2="708" y2="422" stroke="#c2321f" stroke-width="3" marker-end="url(#ahr)"/>

  <!-- ===== Row 5: LEGACY_BILLING_URL (stale, only in example) ===== -->
  <!-- nothing on the .env side -->
  <rect x="48" y="468" width="444" height="56" rx="12" fill="#f6ddd6" stroke="#c2321f" stroke-width="2" stroke-dasharray="6 6"/>
  <text x="270" y="503" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-style="italic" fill="#c2321f">(no longer read in code)</text>

  <rect x="708" y="468" width="444" height="56" rx="12" fill="#f6ddd6" stroke="#c2321f" stroke-width="2"/>
  <text x="728" y="503" font-family="ui-monospace, monospace" font-size="19" fill="#141310">LEGACY_BILLING_URL=</text>

  <line x1="708" y1="496" x2="492" y2="496" stroke="#c2321f" stroke-width="3" marker-end="url(#ahr)"/>

  <!-- ===== Callouts ===== -->
  <!-- Missing-key callout (row 4) -->
  <rect x="48" y="556" width="540" height="74" rx="12" fill="#f6ddd6" stroke="#c2321f" stroke-width="2"/>
  <text x="68" y="586" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="700" fill="#c2321f">MISSING key &#8212; the dangerous one</text>
  <text x="68" y="613" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17" fill="#3a352c"><tspan font-family="ui-monospace, monospace" font-size="16" fill="#141310">STRIPE_WEBHOOK_SECRET</tspan> is read in code but absent from the example.</text>

  <!-- Stale-key callout (row 5) -->
  <rect x="612" y="556" width="540" height="74" rx="12" fill="#f6ddd6" stroke="#c2321f" stroke-width="2"/>
  <text x="632" y="586" font-family="ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="700" fill="#c2321f">STALE key &#8212; merely wasteful</text>
  <text x="632" y="613" font-family="ui-sans-serif, system-ui, sans-serif" font-size="17" fill="#3a352c"><tspan font-family="ui-monospace, monospace" font-size="16" fill="#141310">LEGACY_BILLING_URL</tspan> lingers in the example, read nowhere.</text>
</svg>
