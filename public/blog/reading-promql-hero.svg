<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="How to read a PromQL query — OpsCanopy observability guide">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8b5cf6"/><stop offset="1" stop-color="#6d28d9"/></linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 H0 V40" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/></pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="320" fill="url(#sheen)"/>
  <circle cx="980" cy="315" r="210" fill="#ffffff" fill-opacity="0.08"/>
  <text x="80" y="150" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="26" font-weight="700" letter-spacing="5" fill="#ffffff" fill-opacity="0.85">OBSERVABILITY</text>
  <text font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="68" font-weight="800" fill="#ffffff"><tspan x="80" y="300">How to read</tspan><tspan x="80" y="384">a PromQL query</tspan></text>
  <text x="80" y="560" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" fill="#ffffff" fill-opacity="0.72">opscanopy.com</text>
  <g transform="translate(980,315)" stroke="#ffffff" stroke-opacity="0.95" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- chart axis -->
    <polyline points="-110,55 -110,-35 35,-35"/>
    <!-- bars -->
    <rect x="-98" y="18" width="22" height="37" fill="#ffffff" fill-opacity="0.9" stroke="none"/>
    <rect x="-68" y="-2" width="22" height="57" fill="#ffffff" fill-opacity="0.9" stroke="none"/>
    <rect x="-38" y="24" width="22" height="31" fill="#ffffff" fill-opacity="0.9" stroke="none"/>
    <!-- trend line over the bars -->
    <polyline points="-87,3 -57,-22 -27,3 3,-27"/>
    <!-- magnifying glass -->
    <circle cx="58" cy="-8" r="66"/>
    <line x1="105" y1="39" x2="150" y2="84"/>
  </g>
</svg>
