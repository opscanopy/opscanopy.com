<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Robust regex for log lines — OpsCanopy logs guide">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#14b8a6"/><stop offset="1" stop-color="#0f766e"/></linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 H0 V40" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/></pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="320" fill="url(#sheen)"/>
  <circle cx="980" cy="315" r="210" fill="#ffffff" fill-opacity="0.08"/>
  <text x="80" y="150" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="26" font-weight="700" letter-spacing="5" fill="#ffffff" fill-opacity="0.85">LOGS</text>
  <text font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="68" font-weight="800" fill="#ffffff"><tspan x="80" y="300">Robust regex</tspan><tspan x="80" y="384">for log lines</tspan></text>
  <text x="80" y="560" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" fill="#ffffff" fill-opacity="0.72">opscanopy.com</text>
  <g transform="translate(980,315)" stroke="#ffffff" stroke-opacity="0.95" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- regex glyph: /.*/ — forward slashes wrapping a dot-star -->
    <g transform="translate(0,-58)">
      <line x1="-104" y1="34" x2="-72" y2="-34"/>
      <line x1="72" y1="34" x2="104" y2="-34"/>
      <circle cx="-26" cy="22" r="11" fill="#ffffff" fill-opacity="0.9" stroke="none"/>
      <g transform="translate(30,-4)">
        <line x1="0" y1="-26" x2="0" y2="26"/>
        <line x1="-23" y1="-13" x2="23" y2="13"/>
        <line x1="-23" y1="13" x2="23" y2="-13"/>
      </g>
    </g>
    <!-- stacked log lines -->
    <g transform="translate(0,86)">
      <line x1="-96" y1="0" x2="64" y2="0"/>
      <line x1="-96" y1="38" x2="96" y2="38"/>
      <line x1="-96" y1="76" x2="32" y2="76"/>
    </g>
  </g>
</svg>
