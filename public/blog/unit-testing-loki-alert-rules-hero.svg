  <text font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="68" font-weight="800" fill="#ffffff"><tspan x="80" y="300">Unit testing</tspan><tspan x="80" y="384">Loki alert rules</tspan></text>
  <text x="80" y="560" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" fill="#ffffff" fill-opacity="0.72">opscanopy.com</text>
  <g transform="translate(980,315)" stroke="#ffffff" stroke-opacity="0.95" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Check mark (left) -->
    <circle cx="-80" cy="0" r="60" stroke-opacity="0.55"/>
    <polyline points="-110,4 -88,30 -50,-30"/>
