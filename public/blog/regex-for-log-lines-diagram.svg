<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" role="img" aria-label="A log line with a regular expression, showing named capture groups matching the timestamp, level and message segments">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end"><path d="M0 0 L10 5 L0 10 z" fill="#10b981"/></marker>
    <marker id="ahr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end"><path d="M0 0 L10 5 L0 10 z" fill="#ef4444"/></marker>
    <marker id="ahg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end"><path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="1200" height="640" rx="20" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>

  <text x="48" y="64" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Named capture groups matching a log line</text>

  <!-- THE LOG LINE -->
  <text x="48" y="118" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#334155">Log line</text>
  <rect x="48" y="134" width="1104" height="62" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>

  <!-- timestamp segment highlight -->
  <rect x="64" y="148" width="296" height="34" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="80" y="172" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#0f172a">2026-06-08T10:14:22Z</text>
  <!-- level segment highlight -->
  <rect x="372" y="148" width="68" height="34" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="386" y="172" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#0f172a">INFO</text>
  <!-- message segment highlight -->
  <rect x="452" y="148" width="684" height="34" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="468" y="172" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#0f172a">api request_id=8f3a method=GET path=/v1/users status=200</text>

  <!-- THE REGEX -->
  <text x="48" y="260" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#334155">Regular expression</text>
  <rect x="48" y="276" width="1104" height="62" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>

  <!-- ts group token -->
  <rect x="64" y="290" width="226" height="34" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="78" y="314" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#0f172a">^(?&lt;ts&gt;\S+)\s+</text>
  <!-- level group token -->
  <rect x="298" y="290" width="240" height="34" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="312" y="314" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#0f172a">(?&lt;level&gt;\w+)\s+</text>
  <!-- msg group token -->
  <rect x="546" y="290" width="296" height="34" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="560" y="314" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#0f172a">(?&lt;msg&gt;[^"]*)</text>

  <!-- connecting arrows: regex token -> log segment -->
  <!-- ts: regex box bottom is far; we connect log segment down to its group label below.  Instead connect group tokens UP to the log line segments. -->
  <path d="M177 290 C 177 250, 212 230, 212 184" stroke="#10b981" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <path d="M418 290 C 418 250, 406 232, 406 184" stroke="#10b981" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <path d="M694 290 C 694 250, 720 232, 720 184" stroke="#10b981" stroke-width="3" fill="none" marker-end="url(#ah)"/>

  <!-- LEGEND / group descriptions -->
  <text x="48" y="402" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#334155">Named capture groups</text>

  <!-- ts group card -->
  <rect x="48" y="420" width="352" height="92" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="68" y="452" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#0f172a">(?&lt;ts&gt;…)</text>
  <text x="68" y="484" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#334155">timestamp token</text>

  <!-- level group card -->
  <rect x="424" y="420" width="352" height="92" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="444" y="452" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#0f172a">(?&lt;level&gt;…)</text>
  <text x="444" y="484" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#334155">log level</text>

  <!-- msg group card -->
  <rect x="800" y="420" width="352" height="92" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="820" y="452" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#0f172a">(?&lt;msg&gt;…)</text>
  <text x="820" y="484" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#334155">message body</text>

  <!-- footnote: negated class tip -->
  <rect x="48" y="540" width="1104" height="68" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="68" y="572" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="21" fill="#334155">Prefer a negated class <tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#0f172a">[^"]*</tspan> over a greedy <tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#0f172a">.*</tspan> — it stops at the delimiter and never backtracks.</text>
</svg>
