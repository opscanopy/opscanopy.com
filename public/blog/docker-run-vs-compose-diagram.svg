<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" role="img" aria-label="One container shown in two formats — a single docker run command on the left and a docker-compose.yml service tree on the right — with bidirectional convert arrows">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-end">
      <path d="M0 0 L10 5 L0 10 z" fill="#4a8c3f"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="660" rx="20" fill="#ffffff" stroke="#e6e1d6" stroke-width="2"/>

  <!-- Title -->
  <text x="40" y="62" font-family="ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="700" fill="#141310">One container, two formats</text>

  <!-- ===================== CENTER: container glyph ===================== -->
  <g transform="translate(540, 250)">
    <!-- accent panel behind glyph -->
    <rect x="0" y="0" width="120" height="160" rx="12" fill="#e2eeda" stroke="#4a8c3f" stroke-width="2"/>
    <!-- container body -->
    <rect x="22" y="44" width="76" height="86" rx="6" fill="#ffffff" stroke="#141310" stroke-width="2.5"/>
    <!-- container slats -->
    <line x1="40" y1="52" x2="40" y2="122" stroke="#141310" stroke-width="2"/>
    <line x1="60" y1="52" x2="60" y2="122" stroke="#141310" stroke-width="2"/>
    <line x1="80" y1="52" x2="80" y2="122" stroke="#141310" stroke-width="2"/>
    <!-- whale spout / lid -->
    <rect x="14" y="32" width="92" height="14" rx="4" fill="#4a8c3f" stroke="#141310" stroke-width="2"/>
    <!-- label -->
    <text x="60" y="152" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" fill="#3a352c">container</text>
  </g>

  <!-- ===================== LEFT: docker run command ===================== -->
  <text x="40" y="130" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" fill="#3a352c">docker run</text>
  <rect x="40" y="150" width="468" height="74" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="64" y="194" font-family="ui-monospace, monospace" font-size="19" fill="#141310">docker run -p 8080:80 -v data:/var/lib \</text>

  <rect x="40" y="236" width="468" height="42" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>
  <text x="64" y="263" font-family="ui-monospace, monospace" font-size="19" fill="#141310">  -e ENV=prod nginx:1.27</text>

  <!-- ===================== RIGHT: docker-compose.yml tree ===================== -->
  <text x="692" y="130" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" fill="#3a352c">docker-compose.yml</text>
  <rect x="692" y="150" width="468" height="340" rx="12" fill="#f7f5f0" stroke="#cfc9bb" stroke-width="2"/>

  <!-- tree content -->
  <text x="716" y="192" font-family="ui-monospace, monospace" font-size="19" fill="#141310">services:</text>
  <text x="752" y="232" font-family="ui-monospace, monospace" font-size="19" fill="#141310">web:</text>

  <!-- tree connector spine -->
  <line x1="772" y1="244" x2="772" y2="438" stroke="#cfc9bb" stroke-width="2"/>

  <!-- image -->
  <line x1="772" y1="270" x2="800" y2="270" stroke="#cfc9bb" stroke-width="2"/>
  <text x="808" y="276" font-family="ui-monospace, monospace" font-size="19" fill="#141310">image: nginx:1.27</text>

  <!-- ports -->
  <line x1="772" y1="312" x2="800" y2="312" stroke="#cfc9bb" stroke-width="2"/>
  <text x="808" y="318" font-family="ui-monospace, monospace" font-size="19" fill="#141310">ports:</text>
  <text x="848" y="350" font-family="ui-monospace, monospace" font-size="19" fill="#141310">- "8080:80"</text>

  <!-- volumes -->
  <line x1="772" y1="384" x2="800" y2="384" stroke="#cfc9bb" stroke-width="2"/>
  <text x="808" y="390" font-family="ui-monospace, monospace" font-size="19" fill="#141310">volumes:</text>
  <text x="848" y="422" font-family="ui-monospace, monospace" font-size="19" fill="#141310">- data:/var/lib</text>

  <!-- environment -->
  <line x1="772" y1="456" x2="800" y2="456" stroke="#cfc9bb" stroke-width="2"/>
  <text x="808" y="462" font-family="ui-monospace, monospace" font-size="19" fill="#141310">environment:</text>

  <!-- ===================== Bidirectional convert arrows ===================== -->
  <!-- left command box -> center container -->
  <line x1="510" y1="262" x2="536" y2="312" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>
  <!-- center container -> left command box -->
  <line x1="536" y1="350" x2="510" y2="300" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>
  <text x="490" y="408" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" fill="#4a8c3f" font-weight="700">convert</text>

  <!-- center container -> right compose tree -->
  <line x1="664" y1="312" x2="690" y2="290" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>
  <!-- right compose tree -> center container -->
  <line x1="690" y1="330" x2="664" y2="350" stroke="#4a8c3f" stroke-width="3" marker-end="url(#ah)"/>
  <text x="700" y="408" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" fill="#4a8c3f" font-weight="700">convert</text>

  <!-- Footnote -->
  <text x="40" y="600" font-family="ui-sans-serif, system-ui, sans-serif" font-size="21" fill="#3a352c">Same image, ports, volumes and environment — expressed as one CLI command or as a declarative service.</text>
</svg>
