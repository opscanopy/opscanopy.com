<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Mission 90 Days DevOps — Day 1: What DevOps actually is">
  <!--
    Per-day OG hero template. To make a new day card, copy this file to
    public/mission-90/day-NN-hero.svg and change only:
      1. the aria-label (Day N + title)
      2. the eyebrow "· DAY NN"
      3. the two title tspans (keep each line short so it clears the terminal)
      4. the "Phase N · <phase name>" subtitle
      5. the terminal "$ ./dayNN start" line and "· NN min" runtime
      6. the progress fill width (≈ 300 * day / 90) + the "day N / 90" label
    Then run `npm run gen:og` to rasterize → public/mission-90/day-NN-og.png.
    Self-contained: explicit hex only, no external refs — matches mission-90-hero.svg.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#10b981"/><stop offset="1" stop-color="#047857"/></linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/></linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0 H0 V40" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/></pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="320" fill="url(#sheen)"/>
  <circle cx="980" cy="315" r="210" fill="#ffffff" fill-opacity="0.08"/>
  <text x="80" y="150" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="26" font-weight="700" letter-spacing="5" fill="#ffffff" fill-opacity="0.85">MISSION 90 DAYS DEVOPS &#183; DAY 01</text>
  <text font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="68" font-weight="800" fill="#ffffff"><tspan x="80" y="300">What DevOps</tspan><tspan x="80" y="384">actually is</tspan></text>
  <text x="80" y="452" font-family="ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif" font-size="30" font-weight="500" fill="#ffffff" fill-opacity="0.82">Phase 1 &#183; Foundations</text>
  <text x="80" y="560" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" fill="#ffffff" fill-opacity="0.72">opscanopy.com/mission-90</text>
  <!-- terminal / mission motif -->
  <g transform="translate(980,315)">
    <rect x="-172" y="-132" width="344" height="264" rx="18" fill="#171717" stroke="#ffffff" stroke-opacity="0.14" stroke-width="2"/>
    <circle cx="-150" cy="-108" r="7" fill="#fb7185"/>
    <circle cx="-126" cy="-108" r="7" fill="#fbbf24"/>
    <circle cx="-102" cy="-108" r="7" fill="#34d399"/>
    <line x1="-172" y1="-84" x2="172" y2="-84" stroke="#ffffff" stroke-opacity="0.1" stroke-width="2"/>
    <text font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24" font-weight="600"><tspan x="-150" y="-40" fill="#34d399">$</tspan><tspan fill="#e5e7eb"> ./day01 start</tspan></text>
    <rect x="70" y="-59" width="13" height="24" fill="#34d399" fill-opacity="0.85"/>
    <text x="-150" y="-4" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#9ca3af">foundations &#183; 50 min</text>
    <rect x="-150" y="26" width="300" height="18" rx="9" fill="#ffffff" fill-opacity="0.12"/>
    <rect x="-150" y="26" width="16" height="18" rx="9" fill="#10b981"/>
    <text x="-150" y="86" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" fill="#e5e7eb">day 1 / 90</text>
  </g>
</svg>
