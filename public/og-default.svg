<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Canvas vertical wash: canvas-soft → white -->
    <linearGradient id="canvas" x1="0" y1="0" x2="0" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fdfcfa"/>
      <stop offset="1" stop-color="#f7f5f0"/>
    </linearGradient>

    <!-- Canopy mark gradient (matches favicon) — leaf. -->
    <linearGradient id="oc-canopy" x1="4" y1="7" x2="28" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4a8c3f"/>
      <stop offset="1" stop-color="#33652c"/>
    </linearGradient>

    <!-- Ambient wash — a restrained warm green/amber field (no rainbow mesh). -->
    <radialGradient id="g-blue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(360 70) scale(420)">
      <stop offset="0" stop-color="#4a8c3f" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#4a8c3f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-teal" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(880 60) scale(440)">
      <stop offset="0" stop-color="#8fc97a" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#8fc97a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-violet" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(1080 230) scale(440)">
      <stop offset="0" stop-color="#33652c" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#33652c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-pink" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(1150 70) scale(420)">
      <stop offset="0" stop-color="#a8721f" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#a8721f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-coral" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(640 -40) scale(420)">
      <stop offset="0" stop-color="#4a8c3f" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#4a8c3f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-amber" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(980 -20) scale(400)">
      <stop offset="0" stop-color="#e0a458" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#e0a458" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft fade so the wash dissolves into canvas in the lower-left text zone -->
    <linearGradient id="mesh-fade" x1="0" y1="0" x2="0" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fdfcfa" stop-opacity="0"/>
      <stop offset="0.62" stop-color="#fdfcfa" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#fdfcfa" stop-opacity="0.92"/>
    </linearGradient>
  </defs>

  <!-- Base canvas -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#canvas)"/>

  <!-- Mesh ambient light (hero scale) -->
  <g>
    <rect x="0" y="0" width="1200" height="630" fill="url(#g-blue)"/>
    <rect x="0" y="0" width="1200" height="630" fill="url(#g-teal)"/>
    <rect x="0" y="0" width="1200" height="630" fill="url(#g-violet)"/>
    <rect x="0" y="0" width="1200" height="630" fill="url(#g-pink)"/>
    <rect x="0" y="0" width="1200" height="630" fill="url(#g-coral)"/>
    <rect x="0" y="0" width="1200" height="630" fill="url(#g-amber)"/>
  </g>
  <!-- Fade the mesh out of the text zone so ink copy stays high-contrast -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#mesh-fade)"/>

  <!-- Eyebrow row: canopy mark + mono brand label -->
  
    <g transform="translate(96,122) scale(1.7)" aria-hidden="true">
      <g stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path d="M4 15.5C6.4 10.3 10.8 7 16 7s9.6 3.3 12 8.5" stroke="url(#oc-canopy)"/>
        <path d="M6.5 19.5C8.6 15.2 11.9 12.7 16 12.7s7.4 2.5 9.5 6.8" stroke="#211e19"/>
        <path d="M9 23C10.6 19.9 13.1 18.2 16 18.2s5.4 1.7 7 4.8" stroke="#211e19"/>
      </g>
      <path d="M16 23v3.5" stroke="#211e19" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  <text x="156" y="156"
    font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace"
    font-size="22" letter-spacing="2.4" fill="#7a7568">OPSCANOPY</text>

  <!-- Wordmark. Live system-font text rasterizes reliably in the sharp/librsvg
       pipeline (verified). The vector-path wordmark below is a NON-RENDERED
       contingency (kept in code) in case a future renderer drops the glyphs;
       swap RENDER_VECTOR_WORDMARK to true to draw it instead of / under text. -->
  
  <text x="92" y="318" font-family="'Segoe UI', 'Helvetica Neue', Arial, Helvetica, system-ui, -apple-system, sans-serif"
    font-size="118" font-weight="600" letter-spacing="-5"
    fill="#211e19">OpsCanopy</text>

  <!-- Tagline (muted body) -->
  <text x="96" y="392" font-family="'Segoe UI', 'Helvetica Neue', Arial, Helvetica, system-ui, -apple-system, sans-serif"
    font-size="34" font-weight="400" fill="#524f48">Free, private, browser-based tools</text>
  <text x="96" y="438" font-family="'Segoe UI', 'Helvetica Neue', Arial, Helvetica, system-ui, -apple-system, sans-serif"
    font-size="34" font-weight="400" fill="#524f48">for platform &amp; DevOps engineers.</text>

  <!-- "Featuring AlertLint" chip — squared canvas tag with hairline ring -->
  <g transform="translate(96,498)">
    <rect x="0" y="0" width="312" height="50" rx="6" fill="#fdfcfa" stroke="#e6e1d6" stroke-width="1.5"/>
    <circle cx="34" cy="25" r="5" fill="#4a8c3f"/>
    <text x="56" y="33" font-family="'Segoe UI', 'Helvetica Neue', Arial, Helvetica, system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#211e19">Featuring AlertLint</text>
  </g>

  <!-- Domain, lower-right, mono mute -->
  <text x="1104" y="556" text-anchor="end"
    font-family="ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace"
    font-size="22" fill="#7a7568">opscanopy.com</text>
</svg>