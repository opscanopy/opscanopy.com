<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none" role="img" aria-label="Illustration of the logql promql helper tool">
  <!-- Top query bar (LogQL) -->
  <rect x="48" y="38" width="304" height="40" rx="10" fill="#7a5aa0" fill-opacity="0.12" stroke="#7a5aa0" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- prompt caret on top bar -->
  <path d="M64 52 l8 6 -8 6" stroke="#8a8377" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- abstract query tokens on top bar -->
  <rect x="90" y="52" width="40" height="11" rx="4" fill="#7a5aa0" fill-opacity="0.16" stroke="#7a5aa0" stroke-width="3" stroke-linejoin="round"/>
  <line x1="142" y1="58" x2="170" y2="58" stroke="#b3ab9c" stroke-width="3.5" stroke-linecap="round"/>
  <rect x="182" y="52" width="30" height="11" rx="4" fill="none" stroke="#b3ab9c" stroke-width="3" stroke-linejoin="round"/>
  <line x1="224" y1="58" x2="262" y2="58" stroke="#b3ab9c" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="284" cy="58" r="4" fill="#7a5aa0"/>
  <line x1="300" y1="58" x2="332" y2="58" stroke="#b3ab9c" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Bottom query bar (PromQL) -->
  <rect x="48" y="122" width="304" height="40" rx="10" fill="#7a5aa0" fill-opacity="0.12" stroke="#7a5aa0" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- prompt caret on bottom bar -->
  <path d="M64 136 l8 6 -8 6" stroke="#8a8377" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- abstract query tokens on bottom bar -->
  <line x1="90" y1="142" x2="118" y2="142" stroke="#b3ab9c" stroke-width="3.5" stroke-linecap="round"/>
  <rect x="130" y="136" width="44" height="11" rx="4" fill="#7a5aa0" fill-opacity="0.16" stroke="#7a5aa0" stroke-width="3" stroke-linejoin="round"/>
  <line x1="186" y1="142" x2="214" y2="142" stroke="#b3ab9c" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="236" cy="142" r="4" fill="#7a5aa0"/>
  <rect x="252" y="136" width="34" height="11" rx="4" fill="none" stroke="#b3ab9c" stroke-width="3" stroke-linejoin="round"/>
  <line x1="298" y1="142" x2="332" y2="142" stroke="#b3ab9c" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Two-way swap / convert arrows between the bars -->
  <g stroke="#7a5aa0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- downward arrow (LogQL -> PromQL) -->
    <line x1="178" y1="86" x2="178" y2="114"/>
    <path d="M170 106 l8 9 8 -9"/>
    <!-- upward arrow (PromQL -> LogQL) -->
    <line x1="222" y1="114" x2="222" y2="86"/>
    <path d="M214 94 l8 -9 8 9"/>
  </g>

  <!-- small highlight on top bar -->
  <line x1="56" y1="46" x2="78" y2="46" stroke="#ffffff" stroke-opacity="0.18" stroke-width="3" stroke-linecap="round"/>
</svg>
