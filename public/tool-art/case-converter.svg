<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none" role="img" aria-label="Illustration of the case converter tool">
  <!-- Source card (left) — one phrase of mixed-case text -->
  <rect x="36" y="52" width="116" height="96" rx="10" fill="#a8721f" fill-opacity="0.12" stroke="#a8721f" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- mixed-case source lines (varied widths = words) -->
  <line x1="54" y1="80" x2="118" y2="80" stroke="#8a8377" stroke-width="4" stroke-linecap="round"/>
  <line x1="54" y1="100" x2="134" y2="100" stroke="#b3ab9c" stroke-width="4" stroke-linecap="round"/>
  <line x1="54" y1="120" x2="108" y2="120" stroke="#b3ab9c" stroke-width="4" stroke-linecap="round"/>

  <!-- Convert arrow (center) — one input fanning to many cases -->
  <path d="M168 100 L232 100" stroke="#a8721f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M222 91 L232 100 L222 109" stroke="#a8721f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Results card (right) — stacked labeled case rows -->
  <rect x="248" y="46" width="116" height="108" rx="10" fill="#a8721f" fill-opacity="0.14" stroke="#a8721f" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- row 1: a short key mark + a value bar (camelCase) -->
  <line x1="262" y1="66" x2="288" y2="66" stroke="#a8721f" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="296" y1="66" x2="350" y2="66" stroke="#8a8377" stroke-width="3.5" stroke-linecap="round"/>
  <!-- row 2 (snake_case) -->
  <line x1="262" y1="86" x2="288" y2="86" stroke="#a8721f" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="296" y1="86" x2="344" y2="86" stroke="#b3ab9c" stroke-width="3.5" stroke-linecap="round"/>
  <!-- row 3 (kebab-case) -->
  <line x1="262" y1="106" x2="288" y2="106" stroke="#a8721f" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="296" y1="106" x2="350" y2="106" stroke="#b3ab9c" stroke-width="3.5" stroke-linecap="round"/>
  <!-- row 4 (SCREAMING) -->
  <line x1="262" y1="126" x2="288" y2="126" stroke="#a8721f" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="296" y1="126" x2="338" y2="126" stroke="#b3ab9c" stroke-width="3.5" stroke-linecap="round"/>
</svg>
