<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none" role="img" aria-label="Illustration of the cidr checker tool">
  <!-- outer supernet / covering CIDR range box -->
  <rect x="48" y="44" width="304" height="112" rx="12" fill="#3f6ea5" fill-opacity="0.10" stroke="#3f6ea5" stroke-width="4" stroke-linejoin="round"/>

  <!-- inner contained subnet range box -->
  <rect x="78" y="70" width="150" height="60" rx="10" fill="#3f6ea5" fill-opacity="0.16" stroke="#8a8377" stroke-width="3" stroke-linejoin="round"/>

  <!-- range axis / network span line across inner box -->
  <path d="M96 100 H210" stroke="#b3ab9c" stroke-width="3" stroke-linecap="round"/>
  <!-- start boundary tick -->
  <path d="M96 90 V110" stroke="#b3ab9c" stroke-width="3" stroke-linecap="round"/>
  <!-- end boundary tick -->
  <path d="M210 90 V110" stroke="#b3ab9c" stroke-width="3" stroke-linecap="round"/>

  <!-- the IP dot sitting inside the range -->
  <circle cx="150" cy="100" r="11" fill="#3f6ea5" fill-opacity="0.18" stroke="#3f6ea5" stroke-width="4"/>
  <circle cx="150" cy="100" r="2.5" fill="#3f6ea5"/>
  <!-- drop / pointer marker above the IP dot -->
  <path d="M150 74 V89" stroke="#8a8377" stroke-width="3" stroke-linecap="round"/>

  <!-- in-range tick indicator badge (upper right) -->
  <circle cx="306" cy="78" r="22" fill="#3f6ea5" fill-opacity="0.12" stroke="#3f6ea5" stroke-width="4"/>
  <path d="M295 78 l8 8 l15 -17" stroke="#3f6ea5" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- secondary entries / list rows being checked (lower right) -->
  <path d="M262 122 H336" stroke="#b3ab9c" stroke-width="3" stroke-linecap="round"/>
  <path d="M262 136 H312" stroke="#b3ab9c" stroke-width="3" stroke-linecap="round"/>

  <!-- connector from inner subnet to tick badge implying it is contained/in-range -->
  <path d="M228 92 C256 86, 270 84, 284 80" stroke="#b3ab9c" stroke-width="3" stroke-linecap="round" stroke-dasharray="1 9"/>
</svg>
