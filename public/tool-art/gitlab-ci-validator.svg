<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none" role="img" aria-label="Illustration of the gitlab ci validator tool">
  <!-- .gitlab-ci.yml file card -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <rect x="40" y="44" width="96" height="120" rx="10" fill="#2f7d82" fill-opacity="0.12" stroke="#2f7d82" stroke-width="3.5"/>
    <!-- folded corner -->
    <path d="M118 44 L136 62 L118 62 Z" fill="#2f7d82" fill-opacity="0.18" stroke="#2f7d82" stroke-width="3"/>
    <!-- yaml content lines (indented, key/value abstraction) -->
    <line x1="56" y1="74" x2="100" y2="74" stroke="#8a8377" stroke-width="3.5"/>
    <line x1="64" y1="90" x2="88" y2="90" stroke="#b3ab9c" stroke-width="3.5"/>
    <line x1="64" y1="104" x2="108" y2="104" stroke="#b3ab9c" stroke-width="3.5"/>
    <line x1="56" y1="120" x2="96" y2="120" stroke="#8a8377" stroke-width="3.5"/>
    <line x1="64" y1="136" x2="116" y2="136" stroke="#b3ab9c" stroke-width="3.5"/>
    <line x1="64" y1="150" x2="84" y2="150" stroke="#b3ab9c" stroke-width="3.5"/>
  </g>

  <!-- connector from file to pipeline -->
  <path d="M136 104 L168 104" stroke="#8a8377" stroke-width="3.5" stroke-linecap="round"/>

  <!-- pipeline stage nodes row with connectors -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <line x1="200" y1="104" x2="252" y2="104" stroke="#b3ab9c" stroke-width="3.5"/>
    <line x1="284" y1="104" x2="336" y2="104" stroke="#b3ab9c" stroke-width="3.5"/>

    <!-- node 1: pass -->
    <circle cx="184" cy="104" r="20" fill="#2f7d82" fill-opacity="0.12" stroke="#2f7d82" stroke-width="3.5"/>
    <path d="M175 104 L181 111 L194 97" stroke="#2f7d82" stroke-width="3.5"/>

    <!-- node 2: pass -->
    <circle cx="268" cy="104" r="20" fill="#2f7d82" fill-opacity="0.12" stroke="#2f7d82" stroke-width="3.5"/>
    <path d="M259 104 L265 111 L278 97" stroke="#2f7d82" stroke-width="3.5"/>

    <!-- node 3: error mark -->
    <circle cx="352" cy="104" r="20" fill="#2f7d82" fill-opacity="0.06" stroke="#8a8377" stroke-width="3.5"/>
    <path d="M345 97 L359 111 M359 97 L345 111" stroke="#8a8377" stroke-width="3.5"/>
  </g>

  <!-- small error badge on the failing node -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <circle cx="368" cy="86" r="9" fill="#2f7d82" fill-opacity="0.16" stroke="#2f7d82" stroke-width="3"/>
    <line x1="368" y1="82" x2="368" y2="87" stroke="#2f7d82" stroke-width="3"/>
    <circle cx="368" cy="91" r="0.8" fill="#2f7d82" stroke="#2f7d82" stroke-width="1.6"/>
  </g>
</svg>
