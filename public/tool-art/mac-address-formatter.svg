<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none" role="img" aria-label="Illustration of the mac address formatter tool">
  <!-- TOP ROW: six hex chips separated by colons -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- chip 1 -->
    <rect x="40" y="36" width="38" height="30" rx="7" fill="#2563eb" fill-opacity="0.12" stroke="#2563eb" stroke-width="3"/>
    <line x1="50" y1="51" x2="68" y2="51" stroke="#2563eb" stroke-width="3"/>
    <!-- colon separator -->
    <circle cx="90" cy="45" r="2.4" fill="#64748b"/>
    <circle cx="90" cy="57" r="2.4" fill="#64748b"/>
    <!-- chip 2 -->
    <rect x="102" y="36" width="38" height="30" rx="7" fill="#2563eb" fill-opacity="0.12" stroke="#2563eb" stroke-width="3"/>
    <line x1="112" y1="51" x2="130" y2="51" stroke="#2563eb" stroke-width="3"/>
    <!-- colon separator -->
    <circle cx="152" cy="45" r="2.4" fill="#64748b"/>
    <circle cx="152" cy="57" r="2.4" fill="#64748b"/>
    <!-- chip 3 -->
    <rect x="164" y="36" width="38" height="30" rx="7" fill="#2563eb" fill-opacity="0.12" stroke="#2563eb" stroke-width="3"/>
    <line x1="174" y1="51" x2="192" y2="51" stroke="#2563eb" stroke-width="3"/>
    <!-- colon separator -->
    <circle cx="214" cy="45" r="2.4" fill="#64748b"/>
    <circle cx="214" cy="57" r="2.4" fill="#64748b"/>
    <!-- chip 4 -->
    <rect x="226" y="36" width="38" height="30" rx="7" fill="#2563eb" fill-opacity="0.12" stroke="#2563eb" stroke-width="3"/>
    <line x1="236" y1="51" x2="254" y2="51" stroke="#2563eb" stroke-width="3"/>
    <!-- colon separator -->
    <circle cx="276" cy="45" r="2.4" fill="#64748b"/>
    <circle cx="276" cy="57" r="2.4" fill="#64748b"/>
    <!-- chip 5 -->
    <rect x="288" y="36" width="38" height="30" rx="7" fill="#2563eb" fill-opacity="0.12" stroke="#2563eb" stroke-width="3"/>
    <line x1="298" y1="51" x2="316" y2="51" stroke="#2563eb" stroke-width="3"/>
    <!-- colon separator -->
    <circle cx="338" cy="45" r="2.4" fill="#64748b"/>
    <circle cx="338" cy="57" r="2.4" fill="#64748b"/>
    <!-- chip 6 (partial, trailing into padding) -->
    <rect x="350" y="36" width="26" height="30" rx="7" fill="#2563eb" fill-opacity="0.12" stroke="#2563eb" stroke-width="3"/>
    <line x1="358" y1="51" x2="370" y2="51" stroke="#2563eb" stroke-width="3"/>
  </g>

  <!-- CENTER: reformat swap arrows (colon <-> dash) -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- curved double arrow loop -->
    <path d="M150 96 C150 84 175 84 200 84 C225 84 250 84 250 96" stroke="#2563eb" stroke-width="3.5"/>
    <path d="M250 104 C250 116 225 116 200 116 C175 116 150 116 150 104" stroke="#2563eb" stroke-width="3.5"/>
    <!-- arrow head right (top, pointing right) -->
    <path d="M244 89 L251 96 L244 102" stroke="#2563eb" stroke-width="3.5"/>
    <!-- arrow head left (bottom, pointing left) -->
    <path d="M156 98 L149 104 L156 110" stroke="#2563eb" stroke-width="3.5"/>
    <!-- center pivot dot -->
    <circle cx="200" cy="100" r="3.2" fill="#64748b"/>
  </g>

  <!-- BOTTOM ROW: six hex chips separated by dashes -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- chip 1 -->
    <rect x="40" y="134" width="38" height="30" rx="7" fill="#2563eb" fill-opacity="0.16" stroke="#2563eb" stroke-width="3"/>
    <line x1="50" y1="149" x2="68" y2="149" stroke="#2563eb" stroke-width="3"/>
    <!-- dash separator -->
    <line x1="85" y1="149" x2="95" y2="149" stroke="#64748b" stroke-width="3"/>
    <!-- chip 2 -->
    <rect x="102" y="134" width="38" height="30" rx="7" fill="#2563eb" fill-opacity="0.16" stroke="#2563eb" stroke-width="3"/>
    <line x1="112" y1="149" x2="130" y2="149" stroke="#2563eb" stroke-width="3"/>
    <!-- dash separator -->
    <line x1="147" y1="149" x2="157" y2="149" stroke="#64748b" stroke-width="3"/>
    <!-- chip 3 -->
    <rect x="164" y="134" width="38" height="30" rx="7" fill="#2563eb" fill-opacity="0.16" stroke="#2563eb" stroke-width="3"/>
    <line x1="174" y1="149" x2="192" y2="149" stroke="#2563eb" stroke-width="3"/>
    <!-- dash separator -->
    <line x1="209" y1="149" x2="219" y2="149" stroke="#64748b" stroke-width="3"/>
    <!-- chip 4 -->
    <rect x="226" y="134" width="38" height="30" rx="7" fill="#2563eb" fill-opacity="0.16" stroke="#2563eb" stroke-width="3"/>
    <line x1="236" y1="149" x2="254" y2="149" stroke="#2563eb" stroke-width="3"/>
    <!-- dash separator -->
    <line x1="271" y1="149" x2="281" y2="149" stroke="#64748b" stroke-width="3"/>
    <!-- chip 5 -->
    <rect x="288" y="134" width="38" height="30" rx="7" fill="#2563eb" fill-opacity="0.16" stroke="#2563eb" stroke-width="3"/>
    <line x1="298" y1="149" x2="316" y2="149" stroke="#2563eb" stroke-width="3"/>
    <!-- dash separator -->
    <line x1="333" y1="149" x2="343" y2="149" stroke="#64748b" stroke-width="3"/>
    <!-- chip 6 (partial, trailing into padding) -->
    <rect x="350" y="134" width="26" height="30" rx="7" fill="#2563eb" fill-opacity="0.16" stroke="#2563eb" stroke-width="3"/>
    <line x1="358" y1="149" x2="370" y2="149" stroke="#2563eb" stroke-width="3"/>
  </g>
</svg>
