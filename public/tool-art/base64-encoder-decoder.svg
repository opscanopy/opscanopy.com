<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none" role="img" aria-label="Illustration of the base64 encoder decoder tool">
  <!-- Plain-text card (left) -->
  <rect x="36" y="52" width="116" height="96" rx="10" fill="#b45309" fill-opacity="0.12" stroke="#b45309" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- folded corner accent -->
  <path d="M132 52 L152 72 L132 72 Z" fill="#b45309" fill-opacity="0.18" stroke="#64748b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- plain text lines (full words = readable text) -->
  <line x1="54" y1="78" x2="118" y2="78" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <line x1="54" y1="96" x2="134" y2="96" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="54" y1="114" x2="124" y2="114" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="54" y1="132" x2="100" y2="132" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>

  <!-- Two-way convert arrows (center) -->
  <path d="M168 84 L232 84" stroke="#b45309" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M222 75 L232 84 L222 93" stroke="#b45309" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M232 116 L168 116" stroke="#b45309" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M178 107 L168 116 L178 125" stroke="#b45309" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Encoded Base64 card (right) — segmented blocks suggesting encoded chars -->
  <rect x="248" y="52" width="116" height="96" rx="10" fill="#b45309" fill-opacity="0.14" stroke="#b45309" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- row 1 blocks -->
  <rect x="262" y="70" width="18" height="14" rx="4" fill="#b45309" fill-opacity="0.18" stroke="#64748b" stroke-width="3" stroke-linejoin="round"/>
  <rect x="286" y="70" width="18" height="14" rx="4" fill="#b45309" fill-opacity="0.18" stroke="#94a3b8" stroke-width="3" stroke-linejoin="round"/>
  <rect x="310" y="70" width="18" height="14" rx="4" fill="#b45309" fill-opacity="0.18" stroke="#94a3b8" stroke-width="3" stroke-linejoin="round"/>
  <rect x="334" y="70" width="18" height="14" rx="4" fill="#b45309" fill-opacity="0.18" stroke="#94a3b8" stroke-width="3" stroke-linejoin="round"/>
  <!-- row 2 blocks -->
  <rect x="262" y="92" width="18" height="14" rx="4" fill="#b45309" fill-opacity="0.18" stroke="#94a3b8" stroke-width="3" stroke-linejoin="round"/>
  <rect x="286" y="92" width="18" height="14" rx="4" fill="#b45309" fill-opacity="0.18" stroke="#94a3b8" stroke-width="3" stroke-linejoin="round"/>
  <rect x="310" y="92" width="18" height="14" rx="4" fill="#b45309" fill-opacity="0.18" stroke="#64748b" stroke-width="3" stroke-linejoin="round"/>
  <!-- row 3 blocks -->
  <rect x="262" y="114" width="18" height="14" rx="4" fill="#b45309" fill-opacity="0.18" stroke="#94a3b8" stroke-width="3" stroke-linejoin="round"/>
  <rect x="286" y="114" width="18" height="14" rx="4" fill="#b45309" fill-opacity="0.18" stroke="#94a3b8" stroke-width="3" stroke-linejoin="round"/>
  <!-- padding marks (==) suggested by two small dots -->
  <circle cx="320" cy="121" r="3" fill="#b45309"/>
  <circle cx="334" cy="121" r="3" fill="#b45309"/>
</svg>
