<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none" role="img" aria-label="Illustration of the ip address converter tool">
  <!-- Dotted-decimal octet chips (the source IP) -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <rect x="30" y="58" width="42" height="34" rx="9" fill="#2563eb" fill-opacity="0.12" stroke="#2563eb" stroke-width="3.5"/>
    <rect x="30" y="108" width="42" height="34" rx="9" fill="#2563eb" fill-opacity="0.12" stroke="#2563eb" stroke-width="3.5"/>
    <rect x="84" y="58" width="42" height="34" rx="9" fill="#2563eb" fill-opacity="0.12" stroke="#2563eb" stroke-width="3.5"/>
    <rect x="84" y="108" width="42" height="34" rx="9" fill="#2563eb" fill-opacity="0.12" stroke="#2563eb" stroke-width="3.5"/>

    <!-- abstract digit tick marks inside chips -->
    <path d="M44 70 v10 M58 68 v14" stroke="#64748b" stroke-width="3"/>
    <path d="M44 120 v10 M58 122 v8" stroke="#64748b" stroke-width="3"/>
    <path d="M98 68 v14 M112 70 v10" stroke="#64748b" stroke-width="3"/>
    <path d="M98 122 v8 M112 120 v10" stroke="#64748b" stroke-width="3"/>

    <!-- dot separators between octets -->
    <circle cx="78" cy="100" r="3.5" fill="#94a3b8"/>
    <circle cx="105" cy="100" r="3.5" fill="#94a3b8"/>
    <circle cx="132" cy="100" r="3.5" fill="#94a3b8"/>
  </g>

  <!-- Convert arrow -->
  <g stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M150 100 h44"/>
    <path d="M184 90 l12 10 l-12 10"/>
  </g>

  <!-- Target: binary blocks (top row) and hex blocks (bottom row) -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- panel backing -->
    <rect x="214" y="50" width="152" height="100" rx="12" fill="#2563eb" fill-opacity="0.10" stroke="#2563eb" stroke-width="3.5"/>

    <!-- binary row: small square bits -->
    <rect x="230" y="66" width="16" height="16" rx="4" fill="#2563eb" fill-opacity="0.18" stroke="#2563eb" stroke-width="3"/>
    <rect x="254" y="66" width="16" height="16" rx="4" stroke="#94a3b8" stroke-width="3"/>
    <rect x="278" y="66" width="16" height="16" rx="4" fill="#2563eb" fill-opacity="0.18" stroke="#2563eb" stroke-width="3"/>
    <rect x="302" y="66" width="16" height="16" rx="4" stroke="#94a3b8" stroke-width="3"/>
    <rect x="326" y="66" width="16" height="16" rx="4" fill="#2563eb" fill-opacity="0.18" stroke="#2563eb" stroke-width="3"/>
    <rect x="350" y="66" width="12" height="16" rx="4" stroke="#94a3b8" stroke-width="3"/>

    <!-- divider tick -->
    <path d="M230 100 h132" stroke="#94a3b8" stroke-width="2.5"/>

    <!-- hex row: wider blocks with tick glyphs -->
    <rect x="230" y="112" width="40" height="26" rx="6" fill="#2563eb" fill-opacity="0.14" stroke="#2563eb" stroke-width="3.5"/>
    <rect x="280" y="112" width="40" height="26" rx="6" stroke="#94a3b8" stroke-width="3.5"/>
    <rect x="330" y="112" width="32" height="26" rx="6" fill="#2563eb" fill-opacity="0.14" stroke="#2563eb" stroke-width="3.5"/>

    <path d="M244 120 v10 M252 122 v6" stroke="#64748b" stroke-width="3"/>
    <path d="M294 122 v6 M302 120 v10" stroke="#64748b" stroke-width="3"/>
    <path d="M342 120 v10 M350 122 v6" stroke="#64748b" stroke-width="3"/>
  </g>
</svg>
