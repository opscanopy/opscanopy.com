<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none" role="img" aria-label="Illustration of the alertmanager route tester tool">
  <!-- connectors: root -> two children -->
  <path d="M200 56 L120 104" stroke="#b3ab9c" stroke-width="3" stroke-linecap="round"/>
  <path d="M200 56 L280 104" stroke="#b3ab9c" stroke-width="3" stroke-linecap="round"/>
  <!-- connectors: children -> receiver leaves -->
  <path d="M120 124 L80 162" stroke="#b3ab9c" stroke-width="3" stroke-linecap="round"/>
  <path d="M280 124 L240 162" stroke="#b3ab9c" stroke-width="3" stroke-linecap="round"/>
  <path d="M280 124 L320 162" stroke="#b3ab9c" stroke-width="3" stroke-linecap="round"/>

  <!-- matched path highlight: root -> right child -> right leaf -->
  <path d="M200 56 L280 104" stroke="#7a5aa0" stroke-width="4" stroke-linecap="round"/>
  <path d="M280 124 L320 162" stroke="#7a5aa0" stroke-width="4" stroke-linecap="round"/>

  <!-- root node -->
  <rect x="174" y="32" width="52" height="24" rx="8" fill="#7a5aa0" fill-opacity="0.14" stroke="#7a5aa0" stroke-width="4" stroke-linejoin="round"/>
  <circle cx="190" cy="44" r="2.5" fill="#7a5aa0"/>
  <circle cx="200" cy="44" r="2.5" fill="#7a5aa0"/>
  <circle cx="210" cy="44" r="2.5" fill="#7a5aa0"/>

  <!-- left child route node (unmatched) -->
  <rect x="98" y="104" width="44" height="22" rx="7" fill="#b3ab9c" fill-opacity="0.12" stroke="#8a8377" stroke-width="3.5" stroke-linejoin="round"/>
  <line x1="108" y1="115" x2="132" y2="115" stroke="#8a8377" stroke-width="3" stroke-linecap="round"/>

  <!-- right child route node (matched) -->
  <rect x="258" y="104" width="44" height="22" rx="7" fill="#7a5aa0" fill-opacity="0.16" stroke="#7a5aa0" stroke-width="3.5" stroke-linejoin="round"/>
  <line x1="268" y1="115" x2="292" y2="115" stroke="#7a5aa0" stroke-width="3" stroke-linecap="round"/>

  <!-- receiver leaves (rounded squares) -->
  <rect x="62" y="162" width="34" height="22" rx="6" fill="#b3ab9c" fill-opacity="0.10" stroke="#8a8377" stroke-width="3.5" stroke-linejoin="round"/>
  <rect x="222" y="162" width="34" height="22" rx="6" fill="#b3ab9c" fill-opacity="0.10" stroke="#8a8377" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- matched receiver leaf -->
  <rect x="302" y="162" width="34" height="22" rx="6" fill="#7a5aa0" fill-opacity="0.16" stroke="#7a5aa0" stroke-width="3.5" stroke-linejoin="round"/>
  <path d="M311 173 l4 4 l7 -8" stroke="#7a5aa0" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- alert flowing down the matched path: bell traveling on the right edge -->
  <g transform="translate(258 78)">
    <circle cx="0" cy="0" r="14" fill="#7a5aa0" fill-opacity="0.14" stroke="#7a5aa0" stroke-width="3.5"/>
    <path d="M-5 2 C-5 -4 -3 -7 0 -7 C3 -7 5 -4 5 2 L7 4 L-7 4 Z" fill="none" stroke="#7a5aa0" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="M-2 6 a2 2 0 0 0 4 0" stroke="#7a5aa0" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- small motion ticks along the matched flow -->
  <circle cx="232" cy="91" r="2.5" fill="#7a5aa0" fill-opacity="0.55"/>
  <circle cx="300" cy="142" r="2.5" fill="#7a5aa0" fill-opacity="0.55"/>
</svg>
