<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none" role="img" aria-label="Illustration of the promql explainer tool">
  <!-- query expression bar -->
  <rect x="40" y="70" width="320" height="60" rx="12" fill="#7c3aed" fill-opacity="0.10" stroke="#7c3aed" stroke-width="4" stroke-linejoin="round"/>

  <!-- token block 1 (selector) -->
  <rect x="56" y="86" width="64" height="28" rx="6" fill="#7c3aed" fill-opacity="0.16" stroke="#7c3aed" stroke-width="3" stroke-linejoin="round"/>
  <line x1="68" y1="100" x2="92" y2="100" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>

  <!-- token block 2 (rate) -->
  <rect x="132" y="86" width="48" height="28" rx="6" fill="#7c3aed" fill-opacity="0.16" stroke="#64748b" stroke-width="3" stroke-linejoin="round"/>
  <line x1="144" y1="100" x2="160" y2="100" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>

  <!-- token block 3 (aggregation) -->
  <rect x="192" y="86" width="56" height="28" rx="6" fill="#7c3aed" fill-opacity="0.16" stroke="#7c3aed" stroke-width="3" stroke-linejoin="round"/>
  <line x1="204" y1="100" x2="224" y2="100" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>

  <!-- token block 4 (function) -->
  <rect x="260" y="86" width="40" height="28" rx="6" fill="#7c3aed" fill-opacity="0.16" stroke="#94a3b8" stroke-width="3" stroke-linejoin="round"/>
  <circle cx="280" cy="100" r="3.5" fill="#94a3b8"/>

  <!-- explanation tick lines below the bar -->
  <line x1="56" y1="150" x2="190" y2="150" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <line x1="56" y1="164" x2="148" y2="164" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>

  <!-- magnifying glass over the tokens -->
  <circle cx="296" cy="74" r="34" fill="#7c3aed" fill-opacity="0.12" stroke="#7c3aed" stroke-width="4"/>
  <circle cx="296" cy="74" r="34" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
  <line x1="320" y1="98" x2="344" y2="122" stroke="#7c3aed" stroke-width="6" stroke-linecap="round"/>

  <!-- inspected detail inside the lens -->
  <line x1="282" y1="68" x2="310" y2="68" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>
  <line x1="282" y1="80" x2="302" y2="80" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
</svg>
