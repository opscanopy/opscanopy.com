<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none" role="img" aria-label="Illustration of the GitHub Actions expression tester tool">
  <!-- Expression token panel ${{ }} -->
  <rect x="36" y="78" width="92" height="44" rx="10" fill="#2f7d82" fill-opacity="0.12" stroke="#2f7d82" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- ${{ left bracket marks -->
  <path d="M58 90 q-7 0 -7 10 q0 10 -7 10" stroke="#2f7d82" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M70 90 q-7 0 -7 10 q0 10 -7 10" stroke="#8a8377" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- }} right bracket marks -->
  <path d="M94 90 q7 0 7 10 q0 10 7 10" stroke="#8a8377" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M106 90 q7 0 7 10 q0 10 7 10" stroke="#2f7d82" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- abstract expression dots inside -->
  <circle cx="82" cy="100" r="2.6" fill="#2f7d82"/>

  <!-- connector from token to diamond -->
  <path d="M128 100 H172" stroke="#b3ab9c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="172" cy="100" r="3.2" fill="#b3ab9c"/>

  <!-- decision diamond -->
  <path d="M210 66 L246 100 L210 134 L174 100 Z" fill="#2f7d82" fill-opacity="0.14" stroke="#2f7d82" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- branch fork glyph inside diamond -->
  <path d="M210 110 V92" stroke="#8a8377" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="210" cy="89" r="3" fill="#2f7d82"/>
  <path d="M203 110 h14" stroke="#8a8377" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- TRUE branch connector (up) -->
  <path d="M246 100 H276 a8 8 0 0 0 8 -8 V62" stroke="#2f7d82" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- FALSE branch connector (down) -->
  <path d="M246 100 H276 a8 8 0 0 1 8 8 V138" stroke="#b3ab9c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- TRUE outcome panel with check -->
  <rect x="300" y="38" width="64" height="44" rx="10" fill="#2f7d82" fill-opacity="0.12" stroke="#2f7d82" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M315 60 l8 9 l16 -18" stroke="#2f7d82" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- FALSE outcome panel with cross -->
  <rect x="300" y="118" width="64" height="44" rx="10" fill="#b3ab9c" fill-opacity="0.10" stroke="#8a8377" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M320 130 l24 20" stroke="#8a8377" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M344 130 l-24 20" stroke="#8a8377" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
