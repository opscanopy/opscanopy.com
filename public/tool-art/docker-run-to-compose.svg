<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none" role="img" aria-label="Illustration of the docker run to compose tool">
  <!-- Two small docker run container blocks (source) -->
  <rect x="40" y="62" width="58" height="34" rx="8" fill="#2496ed" fill-opacity="0.12" stroke="#2496ed" stroke-width="3.5" stroke-linejoin="round"/>
  <line x1="54" y1="79" x2="70" y2="79" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
  <circle cx="84" cy="79" r="2.6" fill="#94a3b8"/>

  <rect x="40" y="104" width="58" height="34" rx="8" fill="#2496ed" fill-opacity="0.12" stroke="#2496ed" stroke-width="3.5" stroke-linejoin="round"/>
  <line x1="54" y1="121" x2="70" y2="121" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
  <circle cx="84" cy="121" r="2.6" fill="#94a3b8"/>

  <!-- Connectors merging from the two blocks toward the arrow -->
  <path d="M98 79 H132 Q140 79 140 90 V100" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M98 121 H132 Q140 121 140 110 V100" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Arrow into the compose file -->
  <line x1="140" y1="100" x2="178" y2="100" stroke="#2496ed" stroke-width="4" stroke-linecap="round"/>
  <path d="M170 92 L182 100 L170 108" stroke="#2496ed" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Taller stacked compose file (document) -->
  <path d="M210 40 H320 Q330 40 330 50 V154 Q330 164 320 164 H210 Q200 164 200 154 V50 Q200 40 210 40 Z" fill="#2496ed" fill-opacity="0.10" stroke="#2496ed" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- Folded corner detail -->
  <path d="M312 40 V58 H330" stroke="#94a3b8" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- 3 layered service rows -->
  <rect x="216" y="68" width="98" height="24" rx="6" fill="#2496ed" fill-opacity="0.16" stroke="#2496ed" stroke-width="3" stroke-linejoin="round"/>
  <circle cx="228" cy="80" r="3" fill="#2496ed"/>
  <line x1="240" y1="80" x2="300" y2="80" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>

  <rect x="216" y="98" width="98" height="24" rx="6" fill="#2496ed" fill-opacity="0.16" stroke="#2496ed" stroke-width="3" stroke-linejoin="round"/>
  <circle cx="228" cy="110" r="3" fill="#2496ed"/>
  <line x1="240" y1="110" x2="292" y2="110" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>

  <rect x="216" y="128" width="98" height="24" rx="6" fill="#2496ed" fill-opacity="0.16" stroke="#2496ed" stroke-width="3" stroke-linejoin="round"/>
  <circle cx="228" cy="140" r="3" fill="#2496ed"/>
  <line x1="240" y1="140" x2="304" y2="140" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>

  <!-- Subtle highlight -->
  <line x1="210" y1="52" x2="240" y2="52" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2.5" stroke-linecap="round"/>
</svg>
