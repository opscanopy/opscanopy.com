<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none" role="img" aria-label="Illustration of the chmod calculator tool">
  <!-- File / document card (left) -->
  <rect x="40" y="46" width="104" height="108" rx="10" fill="#a8721f" fill-opacity="0.12" stroke="#a8721f" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- folded corner -->
  <path d="M124 46 L144 66 L124 66 Z" fill="#a8721f" fill-opacity="0.18" stroke="#8a8377" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- file content lines -->
  <line x1="58" y1="86" x2="112" y2="86" stroke="#b3ab9c" stroke-width="4" stroke-linecap="round"/>
  <line x1="58" y1="104" x2="126" y2="104" stroke="#b3ab9c" stroke-width="4" stroke-linecap="round"/>
  <line x1="58" y1="122" x2="104" y2="122" stroke="#b3ab9c" stroke-width="4" stroke-linecap="round"/>
  <!-- rwx tag -->
  <line x1="58" y1="138" x2="96" y2="138" stroke="#a8721f" stroke-width="4" stroke-linecap="round"/>

  <!-- Two-way convert arrows (center) -->
  <path d="M158 92 L196 92" stroke="#a8721f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M188 84 L196 92 L188 100" stroke="#a8721f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M196 116 L158 116" stroke="#a8721f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M166 108 L158 116 L166 124" stroke="#a8721f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Permission matrix (right) — 3x3 rwx grid for owner/group/other -->
  <rect x="212" y="46" width="148" height="108" rx="10" fill="#a8721f" fill-opacity="0.14" stroke="#a8721f" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- column header ticks (r w x) -->
  <line x1="264" y1="60" x2="272" y2="60" stroke="#8a8377" stroke-width="3" stroke-linecap="round"/>
  <line x1="300" y1="60" x2="308" y2="60" stroke="#8a8377" stroke-width="3" stroke-linecap="round"/>
  <line x1="336" y1="60" x2="344" y2="60" stroke="#8a8377" stroke-width="3" stroke-linecap="round"/>

  <!-- row 1: owner rwx (all on) -->
  <rect x="258" y="76" width="20" height="16" rx="4" fill="#a8721f" fill-opacity="0.55" stroke="#a8721f" stroke-width="3" stroke-linejoin="round"/>
  <rect x="294" y="76" width="20" height="16" rx="4" fill="#a8721f" fill-opacity="0.55" stroke="#a8721f" stroke-width="3" stroke-linejoin="round"/>
  <rect x="330" y="76" width="20" height="16" rx="4" fill="#a8721f" fill-opacity="0.55" stroke="#a8721f" stroke-width="3" stroke-linejoin="round"/>
  <!-- row 2: group r-x -->
  <rect x="258" y="100" width="20" height="16" rx="4" fill="#a8721f" fill-opacity="0.55" stroke="#a8721f" stroke-width="3" stroke-linejoin="round"/>
  <rect x="294" y="100" width="20" height="16" rx="4" fill="none" stroke="#b3ab9c" stroke-width="3" stroke-linejoin="round"/>
  <rect x="330" y="100" width="20" height="16" rx="4" fill="#a8721f" fill-opacity="0.55" stroke="#a8721f" stroke-width="3" stroke-linejoin="round"/>
  <!-- row 3: other r-x -->
  <rect x="258" y="124" width="20" height="16" rx="4" fill="#a8721f" fill-opacity="0.55" stroke="#a8721f" stroke-width="3" stroke-linejoin="round"/>
  <rect x="294" y="124" width="20" height="16" rx="4" fill="none" stroke="#b3ab9c" stroke-width="3" stroke-linejoin="round"/>
  <rect x="330" y="124" width="20" height="16" rx="4" fill="#a8721f" fill-opacity="0.55" stroke="#a8721f" stroke-width="3" stroke-linejoin="round"/>

  <!-- row labels (owner/group/other dots) -->
  <circle cx="228" cy="84" r="3.5" fill="#a8721f"/>
  <circle cx="228" cy="108" r="3.5" fill="#8a8377"/>
  <circle cx="228" cy="132" r="3.5" fill="#8a8377"/>
</svg>
