<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none" role="img" aria-label="Illustration of the subnet splitter tool">
  <!-- Parent CIDR block (large) -->
  <rect x="40" y="66" width="96" height="68" rx="10" fill="#3f6ea5" fill-opacity="0.14" stroke="#3f6ea5" stroke-width="4" stroke-linejoin="round"/>
  <!-- tick marks on parent block (abstract address space) -->
  <line x1="58" y1="86" x2="118" y2="86" stroke="#8a8377" stroke-width="3" stroke-linecap="round"/>
  <line x1="58" y1="100" x2="118" y2="100" stroke="#b3ab9c" stroke-width="3" stroke-linecap="round"/>
  <line x1="58" y1="114" x2="100" y2="114" stroke="#b3ab9c" stroke-width="3" stroke-linecap="round"/>

  <!-- Split junction node -->
  <circle cx="168" cy="100" r="9" fill="#3f6ea5" fill-opacity="0.16" stroke="#3f6ea5" stroke-width="4"/>

  <!-- Connector from parent into junction -->
  <line x1="136" y1="100" x2="159" y2="100" stroke="#8a8377" stroke-width="4" stroke-linecap="round"/>

  <!-- Connectors fanning out to subnets -->
  <path d="M177 100 H196 V46 H214" stroke="#b3ab9c" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M177 100 H214" stroke="#b3ab9c" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M177 100 H196 V154 H214" stroke="#b3ab9c" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Subnet blocks (smaller, equal) -->
  <rect x="216" y="30" width="60" height="34" rx="7" fill="#3f6ea5" fill-opacity="0.12" stroke="#3f6ea5" stroke-width="3.5" stroke-linejoin="round"/>
  <rect x="216" y="83" width="60" height="34" rx="7" fill="#3f6ea5" fill-opacity="0.12" stroke="#3f6ea5" stroke-width="3.5" stroke-linejoin="round"/>
  <rect x="216" y="136" width="60" height="34" rx="7" fill="#3f6ea5" fill-opacity="0.12" stroke="#3f6ea5" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- dots marking each equal subnet -->
  <circle cx="232" cy="47" r="3.2" fill="#8a8377"/>
  <circle cx="232" cy="100" r="3.2" fill="#8a8377"/>
  <circle cx="232" cy="153" r="3.2" fill="#8a8377"/>

  <!-- next available / free-space subnet (dashed outline) -->
  <rect x="306" y="83" width="56" height="34" rx="7" stroke="#3f6ea5" stroke-width="3.5" stroke-linejoin="round" stroke-dasharray="2 8" stroke-linecap="round"/>
  <line x1="276" y1="100" x2="304" y2="100" stroke="#b3ab9c" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="324" y1="93" x2="334" y2="93" stroke="#b3ab9c" stroke-width="3" stroke-linecap="round"/>
  <line x1="324" y1="107" x2="344" y2="107" stroke="#b3ab9c" stroke-width="3" stroke-linecap="round"/>
</svg>
