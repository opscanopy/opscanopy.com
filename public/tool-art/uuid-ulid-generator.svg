<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none" role="img" aria-label="Illustration of the UUID and ULID generator tool">
  <!-- ID token card (left) — an identifier with dashed segments -->
  <rect x="34" y="54" width="150" height="92" rx="10" fill="#7a6e52" fill-opacity="0.12" stroke="#7a6e52" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- 8-4-4-4-12 segment ticks (top row) -->
  <line x1="50" y1="78" x2="86" y2="78" stroke="#7a6e52" stroke-width="4" stroke-linecap="round"/>
  <line x1="94" y1="78" x2="112" y2="78" stroke="#8a8377" stroke-width="4" stroke-linecap="round"/>
  <line x1="120" y1="78" x2="138" y2="78" stroke="#8a8377" stroke-width="4" stroke-linecap="round"/>
  <line x1="146" y1="78" x2="168" y2="78" stroke="#7a6e52" stroke-width="4" stroke-linecap="round"/>
  <!-- second row of hex blocks -->
  <line x1="50" y1="98" x2="110" y2="98" stroke="#b3ab9c" stroke-width="4" stroke-linecap="round"/>
  <line x1="118" y1="98" x2="168" y2="98" stroke="#b3ab9c" stroke-width="4" stroke-linecap="round"/>
  <line x1="50" y1="118" x2="98" y2="118" stroke="#b3ab9c" stroke-width="4" stroke-linecap="round"/>
  <line x1="106" y1="118" x2="168" y2="118" stroke="#b3ab9c" stroke-width="4" stroke-linecap="round"/>
  <!-- version dot marker (amber annotation ink) -->
  <circle cx="90" cy="132" r="4" fill="#a85a06"/>

  <!-- Generator gear / dice hint (center) — two-way generate arrow -->
  <path d="M200 84 L248 84" stroke="#7a6e52" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M238 75 L248 84 L238 93" stroke="#7a6e52" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M248 116 L200 116" stroke="#7a6e52" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M210 107 L200 116 L210 125" stroke="#7a6e52" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Batch stack (right) — several generated identifiers in a list -->
  <rect x="256" y="46" width="112" height="24" rx="6" fill="#7a6e52" fill-opacity="0.14" stroke="#7a6e52" stroke-width="3" stroke-linejoin="round"/>
  <rect x="256" y="78" width="112" height="24" rx="6" fill="#7a6e52" fill-opacity="0.10" stroke="#8a8377" stroke-width="3" stroke-linejoin="round"/>
  <rect x="256" y="110" width="112" height="24" rx="6" fill="#7a6e52" fill-opacity="0.10" stroke="#8a8377" stroke-width="3" stroke-linejoin="round"/>
  <!-- row content ticks -->
  <line x1="268" y1="58" x2="330" y2="58" stroke="#b3ab9c" stroke-width="3" stroke-linecap="round"/>
  <line x1="268" y1="90" x2="342" y2="90" stroke="#b3ab9c" stroke-width="3" stroke-linecap="round"/>
  <line x1="268" y1="122" x2="322" y2="122" stroke="#b3ab9c" stroke-width="3" stroke-linecap="round"/>
  <!-- sortable / time-ordered accent marks on the batch (ULID hint) -->
  <circle cx="352" cy="58" r="3" fill="#7a6e52"/>
  <circle cx="352" cy="90" r="3" fill="#8a8377"/>
  <circle cx="352" cy="122" r="3" fill="#8a8377"/>
</svg>
