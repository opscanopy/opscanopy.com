<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none" role="img" aria-label="Illustration of the env example checker tool">
  <!-- Left .env card -->
  <rect x="40" y="38" width="132" height="124" rx="10" fill="#0f766e" fill-opacity="0.12" stroke="#0f766e" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- left card header bar -->
  <line x1="58" y1="58" x2="120" y2="58" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <!-- left rows: key dot + value line -->
  <circle cx="62" cy="82" r="4.5" fill="#0f766e"/>
  <line x1="76" y1="82" x2="152" y2="82" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="62" cy="104" r="4.5" fill="#0f766e"/>
  <line x1="76" y1="104" x2="146" y2="104" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="62" cy="126" r="4.5" fill="#0f766e"/>
  <line x1="76" y1="126" x2="150" y2="126" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="62" cy="148" r="4.5" fill="#0f766e"/>
  <line x1="76" y1="148" x2="140" y2="148" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Right .env.example card -->
  <rect x="228" y="38" width="132" height="124" rx="10" fill="#0f766e" fill-opacity="0.12" stroke="#0f766e" stroke-width="3.5" stroke-linejoin="round"/>
  <line x1="246" y1="58" x2="308" y2="58" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
  <circle cx="250" cy="82" r="4.5" fill="#0f766e"/>
  <line x1="264" y1="82" x2="340" y2="82" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="250" cy="104" r="4.5" fill="#0f766e"/>
  <line x1="264" y1="104" x2="334" y2="104" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round"/>
  <!-- missing row: dashed gap outline, no value -->
  <circle cx="250" cy="126" r="4.5" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-dasharray="2.5 3.5"/>
  <line x1="264" y1="126" x2="320" y2="126" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-dasharray="6 7" stroke-opacity="0.7"/>
  <circle cx="250" cy="148" r="4.5" fill="#0f766e"/>
  <line x1="264" y1="148" x2="328" y2="148" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Connectors between matched rows -->
  <line x1="172" y1="82" x2="228" y2="82" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1 6"/>
  <line x1="172" y1="104" x2="228" y2="104" stroke="#64748b" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1 6"/>

  <!-- Matched indicator: tick badge on top matched row -->
  <circle cx="200" cy="82" r="13" fill="#0f766e" fill-opacity="0.14" stroke="#0f766e" stroke-width="3"/>
  <path d="M194 82 l4 4 l8 -9" stroke="#0f766e" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Drift / missing indicator: gap badge aligned to the missing row -->
  <circle cx="200" cy="126" r="13" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="4 4"/>
  <line x1="195" y1="126" x2="205" y2="126" stroke="#64748b" stroke-width="3.5" stroke-linecap="round"/>
</svg>
