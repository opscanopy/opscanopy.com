<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none" role="img" aria-label="Illustration of the slugify tool">
  <!-- Raw title card (left) — messy text with punctuation/accents -->
  <rect x="36" y="52" width="116" height="96" rx="10" fill="#a8721f" fill-opacity="0.12" stroke="#a8721f" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- uneven "words" separated by gaps = raw title with spaces/punctuation -->
  <line x1="54" y1="80" x2="88" y2="80" stroke="#8a8377" stroke-width="4" stroke-linecap="round"/>
  <line x1="96" y1="80" x2="120" y2="80" stroke="#b3ab9c" stroke-width="4" stroke-linecap="round"/>
  <line x1="128" y1="80" x2="134" y2="80" stroke="#b3ab9c" stroke-width="4" stroke-linecap="round"/>
  <line x1="54" y1="100" x2="72" y2="100" stroke="#b3ab9c" stroke-width="4" stroke-linecap="round"/>
  <line x1="80" y1="100" x2="128" y2="100" stroke="#8a8377" stroke-width="4" stroke-linecap="round"/>
  <line x1="54" y1="120" x2="100" y2="120" stroke="#b3ab9c" stroke-width="4" stroke-linecap="round"/>
  <!-- accent / punctuation marks floating above the raw text -->
  <circle cx="60" cy="70" r="2.5" fill="#a8721f"/>
  <circle cx="112" cy="70" r="2.5" fill="#a8721f"/>

  <!-- Transform arrow (center) -->
  <path d="M168 100 L232 100" stroke="#a8721f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M222 91 L232 100 L222 109" stroke="#a8721f" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Clean slug card (right) — even segments joined by hyphen marks -->
  <rect x="248" y="52" width="116" height="96" rx="10" fill="#a8721f" fill-opacity="0.14" stroke="#a8721f" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- three uniform slug "words" -->
  <rect x="262" y="94" width="26" height="12" rx="4" fill="#4a8c3f" fill-opacity="0.16" stroke="#4a8c3f" stroke-width="3" stroke-linejoin="round"/>
  <rect x="300" y="94" width="26" height="12" rx="4" fill="#4a8c3f" fill-opacity="0.16" stroke="#4a8c3f" stroke-width="3" stroke-linejoin="round"/>
  <rect x="338" y="94" width="14" height="12" rx="4" fill="#4a8c3f" fill-opacity="0.16" stroke="#4a8c3f" stroke-width="3" stroke-linejoin="round"/>
  <!-- separator marks between the slug words (leaf-as-ink) -->
  <line x1="291" y1="100" x2="297" y2="100" stroke="#4a8c3f" stroke-width="3" stroke-linecap="round"/>
  <line x1="329" y1="100" x2="335" y2="100" stroke="#4a8c3f" stroke-width="3" stroke-linecap="round"/>
</svg>
