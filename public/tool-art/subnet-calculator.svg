<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none" role="img" aria-label="Illustration of the subnet calculator tool">
  <!-- Large IP/CIDR block on the left -->
  <rect x="40" y="58" width="118" height="84" rx="12" fill="#2563eb" fill-opacity="0.12" stroke="#2563eb" stroke-width="4" stroke-linejoin="round"/>
  <!-- CIDR slash divider inside the big block -->
  <line x1="118" y1="68" x2="98" y2="132" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
  <!-- address dots (network portion) -->
  <circle cx="62" cy="86" r="4.5" fill="#2563eb"/>
  <circle cx="80" cy="86" r="4.5" fill="#2563eb"/>
  <circle cx="62" cy="110" r="4.5" fill="#64748b"/>
  <!-- prefix tick marks (host portion) -->
  <line x1="128" y1="84" x2="146" y2="84" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <line x1="128" y1="100" x2="146" y2="100" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <line x1="128" y1="116" x2="142" y2="116" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>

  <!-- Subdividing bracket -->
  <path d="M170 64 H184 V96 H196 V104 H184 V136 H170" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Connector lines fanning out to the host grid -->
  <path d="M196 100 H214" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <path d="M214 100 V72 H236" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M214 100 H236" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  <path d="M214 100 V128 H236" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small grid of host nodes (2 columns x 3 rows) -->
  <rect x="240" y="58" width="50" height="28" rx="7" fill="#2563eb" fill-opacity="0.14" stroke="#2563eb" stroke-width="3.5" stroke-linejoin="round"/>
  <rect x="306" y="58" width="50" height="28" rx="7" fill="none" stroke="#94a3b8" stroke-width="3.5" stroke-linejoin="round"/>
  <rect x="240" y="92" width="50" height="28" rx="7" fill="none" stroke="#2563eb" stroke-width="3.5" stroke-linejoin="round"/>
  <rect x="306" y="92" width="50" height="28" rx="7" fill="#2563eb" fill-opacity="0.14" stroke="#2563eb" stroke-width="3.5" stroke-linejoin="round"/>
  <rect x="240" y="126" width="50" height="28" rx="7" fill="none" stroke="#94a3b8" stroke-width="3.5" stroke-linejoin="round"/>
  <rect x="306" y="126" width="50" height="28" rx="7" fill="#2563eb" fill-opacity="0.14" stroke="#2563eb" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- host node dots -->
  <circle cx="265" cy="72" r="3.5" fill="#2563eb"/>
  <circle cx="331" cy="72" r="3.5" fill="#94a3b8"/>
  <circle cx="265" cy="106" r="3.5" fill="#2563eb"/>
  <circle cx="331" cy="106" r="3.5" fill="#2563eb"/>
  <circle cx="265" cy="140" r="3.5" fill="#94a3b8"/>
  <circle cx="331" cy="140" r="3.5" fill="#2563eb"/>
</svg>
