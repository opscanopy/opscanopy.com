<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none" role="img" aria-label="Illustration of the kubernetes resource calculator tool">
  <!-- soft panel behind the pod -->
  <rect x="40" y="44" width="150" height="112" rx="12" fill="#5560a8" fill-opacity="0.10" stroke="#b3ab9c" stroke-width="3"/>

  <!-- central hexagon / k8s pod -->
  <path d="M115 56 L150 76 L150 116 L115 136 L80 116 L80 76 Z" fill="#5560a8" fill-opacity="0.16" stroke="#5560a8" stroke-width="4" stroke-linejoin="round"/>
  <!-- inner spokes (helm-like) -->
  <circle cx="115" cy="96" r="11" fill="none" stroke="#5560a8" stroke-width="3.5"/>
  <path d="M115 96 L115 67 M115 96 L141 84 M115 96 L141 109 M115 96 L89 109 M115 96 L89 84" stroke="#8a8377" stroke-width="3" stroke-linecap="round"/>

  <!-- replica stacking hint (two ghost pods) -->
  <path d="M158 64 L168 70 L168 122 L158 128" stroke="#b3ab9c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M172 72 L178 76 L178 116 L172 120" stroke="#b3ab9c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>

  <!-- connector to gauges -->
  <path d="M190 96 L214 96" stroke="#8a8377" stroke-width="3" stroke-linecap="round"/>
  <circle cx="214" cy="96" r="3.5" fill="#8a8377"/>

  <!-- CPU gauge (requests vs limits) -->
  <g>
    <!-- requests bar (filled) -->
    <rect x="230" y="62" width="74" height="18" rx="8" fill="#5560a8" fill-opacity="0.14" stroke="#5560a8" stroke-width="3.5"/>
    <rect x="234" y="66" width="34" height="10" rx="5" fill="#5560a8" fill-opacity="0.55"/>
    <!-- limits bar (outline, wider) -->
    <rect x="230" y="88" width="120" height="18" rx="8" fill="none" stroke="#b3ab9c" stroke-width="3.5"/>
    <rect x="234" y="92" width="86" height="10" rx="5" fill="#b3ab9c" fill-opacity="0.40"/>
    <!-- tick marks -->
    <path d="M230 112 L230 116 M260 112 L260 116 M290 112 L290 116 M320 112 L320 116 M350 112 L350 116" stroke="#8a8377" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- memory gauge (requests vs limits) -->
  <g>
    <rect x="230" y="128" width="60" height="18" rx="8" fill="#5560a8" fill-opacity="0.14" stroke="#5560a8" stroke-width="3.5"/>
    <rect x="234" y="132" width="26" height="10" rx="5" fill="#5560a8" fill-opacity="0.55"/>
    <rect x="230" y="154" width="120" height="18" rx="8" fill="none" stroke="#b3ab9c" stroke-width="3.5"/>
    <rect x="234" y="158" width="64" height="10" rx="5" fill="#b3ab9c" fill-opacity="0.40"/>
  </g>

  <!-- gauge category dots (CPU vs MEM marker, abstract) -->
  <circle cx="218" cy="71" r="4" fill="#5560a8"/>
  <circle cx="218" cy="137" r="4" fill="#8a8377"/>
</svg>
