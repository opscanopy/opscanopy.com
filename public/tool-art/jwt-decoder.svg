<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none" role="img" aria-label="Illustration of the jwt decoder tool">
  <!-- The JWT: three joined colored segments header.payload.signature -->
  <g stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- header segment -->
    <rect x="40" y="40" width="58" height="34" rx="8" fill="#e11d48" fill-opacity="0.16" stroke="#e11d48"/>
    <!-- payload segment (wider, the part that opens up) -->
    <rect x="106" y="40" width="78" height="34" rx="8" fill="#e11d48" fill-opacity="0.12" stroke="#e11d48"/>
    <!-- signature segment -->
    <rect x="192" y="40" width="58" height="34" rx="8" fill="#e11d48" fill-opacity="0.16" stroke="#e11d48"/>
    <!-- dot separators between segments -->
    <circle cx="102" cy="57" r="2.6" fill="#64748b" stroke="none"/>
    <circle cx="188" cy="57" r="2.6" fill="#64748b" stroke="none"/>
    <!-- abstract tick marks inside each segment (no letters) -->
    <line x1="52" y1="57" x2="74" y2="57" stroke="#94a3b8"/>
    <line x1="120" y1="57" x2="158" y2="57" stroke="#94a3b8"/>
    <line x1="204" y1="57" x2="226" y2="57" stroke="#94a3b8"/>
  </g>

  <!-- connectors: payload opening down into decoded field rows -->
  <g stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M145 76 L145 92 Q145 98 152 98 L120 98 Q113 98 113 104 L113 112"/>
    <path d="M145 76 L145 92 Q145 98 152 98 L232 98 Q239 98 239 104 L239 112"/>
  </g>

  <!-- decoded panel holding the claim field rows -->
  <rect x="64" y="112" width="272" height="62" rx="11" fill="#e11d48" fill-opacity="0.10" stroke="#94a3b8" stroke-width="3" stroke-linejoin="round"/>

  <!-- field rows: key dot + value bar -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- row 1 -->
    <circle cx="84" cy="129" r="3.4" fill="#e11d48" stroke="none"/>
    <line x1="98" y1="129" x2="142" y2="129" stroke="#64748b" stroke-width="3.5"/>
    <line x1="152" y1="129" x2="216" y2="129" stroke="#94a3b8" stroke-width="3.5"/>
    <!-- row 2 -->
    <circle cx="84" cy="143" r="3.4" fill="#e11d48" stroke="none"/>
    <line x1="98" y1="143" x2="136" y2="143" stroke="#64748b" stroke-width="3.5"/>
    <line x1="146" y1="143" x2="198" y2="143" stroke="#94a3b8" stroke-width="3.5"/>
    <!-- row 3 -->
    <circle cx="84" cy="157" r="3.4" fill="#e11d48" stroke="none"/>
    <line x1="98" y1="157" x2="148" y2="157" stroke="#64748b" stroke-width="3.5"/>
    <line x1="158" y1="157" x2="206" y2="157" stroke="#94a3b8" stroke-width="3.5"/>
  </g>

  <!-- expiry / validity check badge on the right of the panel -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <circle cx="304" cy="143" r="18" fill="#e11d48" fill-opacity="0.16" stroke="#e11d48" stroke-width="3.5"/>
    <path d="M295 144 l6 6 l12 -14" stroke="#e11d48" stroke-width="3.5" fill="none"/>
  </g>
</svg>
