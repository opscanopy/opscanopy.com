<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none" role="img" aria-label="Illustration of the cron to systemd tool">
  <!-- LEFT: cron strip / schedule panel -->
  <rect x="34" y="46" width="108" height="108" rx="12" fill="#b0562e" fill-opacity="0.12" stroke="#b0562e" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- cron field columns (tick marks, no letters) -->
  <line x1="56" y1="68" x2="56" y2="132" stroke="#b3ab9c" stroke-width="3" stroke-linecap="round"/>
  <line x1="76" y1="68" x2="76" y2="132" stroke="#b3ab9c" stroke-width="3" stroke-linecap="round"/>
  <line x1="96" y1="68" x2="96" y2="132" stroke="#b3ab9c" stroke-width="3" stroke-linecap="round"/>
  <line x1="116" y1="68" x2="116" y2="132" stroke="#b3ab9c" stroke-width="3" stroke-linecap="round"/>
  <!-- field value dots / stars on the cron strip -->
  <circle cx="56" cy="82" r="3.4" fill="#b0562e"/>
  <circle cx="76" cy="100" r="3.4" fill="#b0562e"/>
  <circle cx="96" cy="90" r="3.4" fill="#8a8377"/>
  <circle cx="116" cy="116" r="3.4" fill="#b0562e"/>
  <circle cx="56" cy="116" r="3.4" fill="#8a8377"/>
  <circle cx="96" cy="118" r="3.4" fill="#b3ab9c" fill-opacity="0.9"/>

  <!-- small clock badge anchored on the cron panel -->
  <circle cx="88" cy="46" r="20" fill="#b0562e" fill-opacity="0.14" stroke="#b0562e" stroke-width="3.5"/>
  <line x1="88" y1="46" x2="88" y2="34" stroke="#b0562e" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="88" y1="46" x2="98" y2="50" stroke="#b0562e" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="88" cy="46" r="2.6" fill="#b0562e"/>

  <!-- CENTER: conversion arrow -->
  <line x1="150" y1="100" x2="236" y2="100" stroke="#8a8377" stroke-width="4" stroke-linecap="round"/>
  <path d="M224 90 L240 100 L224 110" fill="none" stroke="#8a8377" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- transformation spark above the arrow -->
  <path d="M193 80 l5 -11 l5 11" fill="none" stroke="#b3ab9c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- RIGHT: systemd timer gear -->
  <g stroke="#b0562e" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
    <!-- gear teeth as spokes around the hub -->
    <line x1="316" y1="46" x2="316" y2="62"/>
    <line x1="316" y1="138" x2="316" y2="154"/>
    <line x1="270" y1="100" x2="286" y2="100"/>
    <line x1="346" y1="100" x2="362" y2="100"/>
    <line x1="283" y1="67" x2="294" y2="78"/>
    <line x1="338" y1="122" x2="349" y2="133"/>
    <line x1="349" y1="67" x2="338" y2="78"/>
    <line x1="294" y1="122" x2="283" y2="133"/>
  </g>
  <circle cx="316" cy="100" r="34" fill="#b0562e" fill-opacity="0.12" stroke="#b0562e" stroke-width="3.5"/>
  <!-- inner timer hub: a clock face echoing the schedule, now inside the gear -->
  <circle cx="316" cy="100" r="15" fill="#b0562e" fill-opacity="0.16" stroke="#8a8377" stroke-width="3"/>
  <line x1="316" y1="100" x2="316" y2="90" stroke="#b0562e" stroke-width="3" stroke-linecap="round"/>
  <line x1="316" y1="100" x2="324" y2="104" stroke="#b0562e" stroke-width="3" stroke-linecap="round"/>
  <circle cx="316" cy="100" r="2.4" fill="#b0562e"/>
</svg>
