<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none" role="img" aria-label="Illustration of the prometheus relabel tester tool">
  <!-- input label tags (entering) -->
  <g stroke="#b3ab9c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M40 56 h36 a6 6 0 0 1 6 6 v12 a6 6 0 0 1 -6 6 h-36 l-12 -12 z" fill="#7a5aa0" fill-opacity="0.12"/>
    <path d="M40 98 h36 a6 6 0 0 1 6 6 v12 a6 6 0 0 1 -6 6 h-36 l-12 -12 z" fill="#7a5aa0" fill-opacity="0.12"/>
    <path d="M40 140 h36 a6 6 0 0 1 6 6 v12 a6 6 0 0 1 -6 6 h-36 l-12 -12 z" fill="#7a5aa0" fill-opacity="0.12"/>
  </g>
  <!-- tag eyelet dots -->
  <g fill="#8a8377">
    <circle cx="36" cy="68" r="2.5"/>
    <circle cx="36" cy="110" r="2.5"/>
    <circle cx="36" cy="152" r="2.5"/>
  </g>

  <!-- connectors into the pipeline -->
  <g stroke="#b3ab9c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M84 68 C108 68 116 96 140 100"/>
    <path d="M84 110 h56"/>
    <path d="M84 152 C108 152 116 124 140 120"/>
  </g>

  <!-- relabel pipeline box (regex / action engine) -->
  <rect x="140" y="60" width="120" height="80" rx="12" stroke="#7a5aa0" stroke-width="4" fill="#7a5aa0" fill-opacity="0.14" stroke-linejoin="round"/>
  <!-- regex slashes inside -->
  <g stroke="#7a5aa0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M164 88 l14 24"/>
    <path d="M222 88 l-14 24"/>
  </g>
  <!-- action gear/dots row -->
  <g stroke="#8a8377" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M158 124 h84"/>
  </g>
  <g fill="#7a5aa0">
    <circle cx="168" cy="124" r="3"/>
    <circle cx="200" cy="124" r="3"/>
    <circle cx="232" cy="124" r="3"/>
  </g>

  <!-- output connectors -->
  <g stroke="#b3ab9c" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M260 88 C292 88 300 76 324 76"/>
    <path d="M260 116 C292 116 300 128 324 128"/>
  </g>
  <!-- arrowhead suggesting emergence/rewrite -->
  <g stroke="#7a5aa0" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M300 70 l8 6 -8 6"/>
    <path d="M300 122 l8 6 -8 6"/>
  </g>

  <!-- output (rewritten) label tags -->
  <g stroke="#7a5aa0" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M336 64 h28 a6 6 0 0 1 6 6 v12 a6 6 0 0 1 -6 6 h-28 l-12 -12 z" fill="#7a5aa0" fill-opacity="0.18"/>
    <path d="M336 116 h28 a6 6 0 0 1 6 6 v12 a6 6 0 0 1 -6 6 h-28 l-12 -12 z" fill="#7a5aa0" fill-opacity="0.18"/>
  </g>
  <g fill="#7a5aa0">
    <circle cx="332" cy="76" r="2.5"/>
    <circle cx="332" cy="128" r="2.5"/>
  </g>
  <!-- tiny rewrite tick marks on output tags -->
  <g stroke="#8a8377" stroke-width="2.5" stroke-linecap="round">
    <path d="M344 76 h18"/>
    <path d="M344 128 h18"/>
  </g>
</svg>
