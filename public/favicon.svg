<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="OpsCanopy">
  <defs>
    <!-- Brand emerald: color-brand #10b981 into color-brand-strong #047857. -->
    <linearGradient id="oc-bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#10b981" />
      <stop offset="1" stop-color="#047857" />
    </linearGradient>
  </defs>
  <!-- App-icon squircle so the mark stays legible on any tab background. -->
  <rect width="32" height="32" rx="7.5" fill="url(#oc-bg)" />
  <!-- Canopy: three sheltering arcs (graduated opacity = depth) + trunk, in
       white so they read crisply at 16px against the emerald field. Geometry
       mirrors the header Logo mark, centred on x=16. -->
  <g stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M4 15.5C6.4 10.3 10.8 7 16 7s9.6 3.3 12 8.5" opacity="0.55" />
    <path d="M6.5 19.5C8.6 15.2 11.9 12.7 16 12.7s7.4 2.5 9.5 6.8" opacity="0.78" />
    <path d="M9 23C10.6 19.9 13.1 18.2 16 18.2s5.4 1.7 7 4.8" opacity="1" />
  </g>
  <path d="M16 23v3.6" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" />
</svg>
